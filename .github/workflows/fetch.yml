name: LedgerAmp Discography Fetch

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically once a day at midnight UTC
  workflow_dispatch: # Allows manual trigger whenever you click it

permissions:
  contents: write

jobs:
  build-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # Only 'requests' is needed now. Removed heavy NLP and RSS libraries.
        run: |
          pip install requests

      - name: Run Engine (Fetch APIs & Seal Blocks)
        # This script runs through the artist arrays, builds tracklists, and exits
        run: python -u engine.py

      - name: Commit and Push Ledger
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ledger.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update ledger" && git push)