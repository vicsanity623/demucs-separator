name: PyOB Autonomous Evolution

concurrency:
  group: pyob-singleton
  cancel-in-progress: false

on:
  workflow_dispatch: # Allows you to start it manually

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Target Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyOB Engine
        run: |
          # THE KEY CHANGE: Install PyOB directly from your main repository
          pip install git+https://github.com/vicsanity623/PyOB.git
          
          # Install necessary runtime dependencies
          pip install flask blinker click itsdangerous jinja2 markupsafe werkzeug
          pip install ruff mypy pytest types-requests types-chardet

      - name: Run PyOB Service
        env:
          PYOB_OPENROUTER_KEY: ${{ secrets.PYOB_OPENROUTER_KEY }}
          PYOB_GEMINI_KEYS: ${{ secrets.PYOB_GEMINI_KEYS }}
          GITHUB_TOKEN: ${{ secrets.AI_MODELS_TOKEN }} 
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          git config --global user.email "pyob-bot@users.noreply.github.com"
          git config --global user.name "pyob-bot"
          
          # 1. Start the SSH Tunnel (Optional, but good for HUD)
          ssh -o StrictHostKeyChecking=no -R 80:localhost:5000 a.pinggy.io "printf 'keepalive'" > tunnel.log 2>&1 &
          sleep 10
          
          # 2. Launch the bot against the current directory (.)
          pyob . --iterations 2
          
          echo "=================================================="
          echo "🚀 LIVE HUD TUNNEL:"
          cat tunnel.log | grep -o 'https://[^ ]*\.pinggy.link' || echo "Link generating..."
          echo "=================================================="
