                    comp.state.current = current;

                    const dt = 0.25;
                    if (current > 0) {
                        if (comp.state.forming < 100) {
                            comp.state.forming = Math.min(100, comp.state.forming + current * 40 * dt);
                        } else {
                            comp.state.charge = Math.min(100, comp.state.charge + current * 20 * dt);
                        }
                    } else if (current < 0) {
                        comp.state.charge = Math.max(0, comp.state.charge + current * 15 * dt);
                    }

                    document.getElementById(`${comp.id}-forming`).innerText = Math.round(comp.state.forming) + '%';
                    document.getElementById(`${comp.id}-forming-bar`).style.width = comp.state.forming + '%';
                    document.getElementById(`${comp.id}-charge`).innerText = Math.round(comp.state.charge) + '%';
                    document.getElementById(`${comp.id}-charge-bar`).style.width = comp.state.charge + '%';
                    
                    const activeV = (formingRatio * (1.5 + 0.5 * chargeRatio)).toFixed(2);
                    document.getElementById(`${comp.id}-voltage`).innerText = activeV + ' V';
                    document.getElementById(`${comp.id}-current`).innerText = (current * 1000).toFixed(1) + ' mA';

                    const bubbleAlert = document.getElementById(`${comp.id}-bubbling`);
                    if (current > 0.012 && comp.state.forming >= 95) {
                        bubbleAlert.classList.remove('hidden');
                    } else {
                        bubbleAlert.classList.add('hidden');
                    }
                }
                else if (comp.type === 'led') {
                    const bulb = document.getElementById(`${comp.id}-bulb`);
                    const bulbInner = document.getElementById(`${comp.id}-bulb-inner`);
                    const statusText = document.getElementById(`${comp.id}-status`);

                    if (comp.state.blown) {
                        bulb.className = "relative w-8 h-8 rounded-full border border-rose-950 flex items-center justify-center bg-slate-900";
                        bulbInner.className = "w-4 h-4 rounded-full bg-rose-950/40 border border-rose-900";
                        statusText.innerText = "💥 BLOWN (Melted)";
                        statusText.className = "text-[9px] text-center text-rose-500 font-bold";
                        document.getElementById(`${comp.id}-reset`).classList.remove('hidden');
                        return;
                    }

                    const vAnode = comp.terminals.find(t => t.label === '+').voltage;
                    const vCathode = comp.terminals.find(t => t.label === '-').voltage;
                    const Vf = 2.0;
                    const vDiff = vAnode - vCathode;
                    let current = 0.0;
                    if (vDiff > Vf) {
                        current = (vDiff - Vf) / 20;
                    }

                    comp.state.current = current;

                    if (current > 0.045) {
                        comp.state.blown = true;
                    } else if (current > 0.001) {
                        const intensity = Math.min(1, current / 0.02);
                        bulb.style.borderColor = `rgba(16, 185, 129, ${0.4 + intensity * 0.6})`;
                        bulb.style.boxShadow = `0 0 ${10 + intensity * 15}px rgba(16, 185, 129, ${0.3 + intensity * 0.7})`;
                        bulbInner.style.backgroundColor = `rgba(16, 185, 129, ${0.7 + intensity * 0.3})`;
                        statusText.innerText = `Active: ${(current * 1000).toFixed(1)} mA`;
                        statusText.className = "text-[10px] text-center text-emerald-400 font-medium";
                    } else {
                        bulb.style.borderColor = '';
                        bulb.style.boxShadow = '';
                        bulbInner.style.backgroundColor = '';
                        statusText.innerText = "Off";
                        statusText.className = "text-[10px] text-center text-slate-400";
                    }
                }
                else if (comp.type === 'multimeter') {
                    const vRed = comp.terminals.find(t => t.label === 'VΩ+').voltage;
                    const vBlack = comp.terminals.find(t => t.label === 'COM-').voltage;
                    const display = document.getElementById(`${comp.id}-display`);
                    
                    if (comp.state.mode === 'voltage') {
                        const measured = vRed - vBlack;
                        display.innerText = measured.toFixed(2) + ' V';
                    } else {
                        const measuredI = (vRed - vBlack) / 0.1;
                        display.innerText = (measuredI * 1000).toFixed(1) + ' mA';
                    }
                }
            });

            evaluateActiveTutorial(nodeMap);
            
            // Render side panel metrics
            const metricsContainer = document.getElementById('live-metrics');
            metricsContainer.innerHTML = tutorialGuides[currentTutorial].liveMetrics();
        }

        // Checklist Path and Connection Verification Logic with optional chaining protections
        function evaluateActiveTutorial(nodeMap) {
            const steps = tutorialGuides[currentTutorial].steps;

            if (currentTutorial === 'lead_acid') {
                const step1 = document.getElementById('step-1');
                const step2 = document.getElementById('step-2');
                const step3 = document.getElementById('step-3');
                const step4 = document.getElementById('step-4');
                const step5 = document.getElementById('step-5');

                const cells = components.filter(c => c.type === 'diy_cell');
                const pwr = components.find(c => c.type === 'usb_power');
                const resistors = components.filter(c => c.type === 'resistor');
                const leds = components.filter(c => c.type === 'led');

                // Step 1: Placement
                const step1Passed = (cells.length >= 2 && pwr);
                updateStepStyle(step1, step1Passed, steps[0].title);
                if (!step1Passed) {
                    updateStepStyle(step2, false, steps[1].title, true);
                    updateStepStyle(step3, false, steps[2].title, true);
                    updateStepStyle(step4, false, steps[3].title, true);
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                // Step 2: Series Battery Connection
                let seriesConnected = false;
                if (cells.length >= 2) {
                    const c1A_t = cells[0].terminals.find(t => t.label === '+');
                    const c1C_t = cells[0].terminals.find(t => t.label === '-');
                    const c2A_t = cells[1].terminals.find(t => t.label === '+');
                    const c2C_t = cells[1].terminals.find(t => t.label === '-');

                    if (c1A_t && c1C_t && c2A_t && c2C_t) {
                        const c1A = nodeMap[c1A_t.id];
                        const c1C = nodeMap[c1C_t.id];
                        const c2A = nodeMap[c2A_t.id];
                        const c2C = nodeMap[c2C_t.id];

                        if (c1C === c2A && c1C !== undefined && c1A !== c2C) {
                            seriesConnected = true;
                        } else if (c2C === c1A && c2C !== undefined && c2A !== c1C) {
                            seriesConnected = true;
                        }
                    }
                }
                updateStepStyle(step2, seriesConnected, steps[1].title, !step1Passed);
                if (!seriesConnected) {
                    updateStepStyle(step3, false, steps[2].title, true);
                    updateStepStyle(step4, false, steps[3].title, true);
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                // Step 3: Resistor Protection Value
                const protectionResistor = resistors.find(r => r.state.resistance >= 75 && r.state.resistance <= 90);
                const step3Passed = !!protectionResistor;
                updateStepStyle(step3, step3Passed, steps[2].title, !seriesConnected);
                if (!step3Passed) {
                    updateStepStyle(step4, false, steps[3].title, true);
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                // Step 4: Forming Charge Verification
                const formingActive = cells.some(c => c.state.current > 0.005);
                const bothFullyFormed = cells.every(c => c.state.forming >= 99 && c.state.charge > 5);
                
                let step4Label = steps[3].title;
                if (formingActive && !bothFullyFormed) {
                    step4Label += ` (${Math.round(cells[0].state.forming)}% Formed)`;
                }
                updateStepStyle(step4, bothFullyFormed, step4Label, !step3Passed);
                if (!bothFullyFormed) {
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                // Step 5: Safe Load Testing Loop
                let loadLoopIntact = false;
                if (leds.length > 0 && resistors.length > 0) {
                    const activeLed = leds.find(l => l.state.current > 0.001 && !l.state.blown);
                    const activeRes = resistors.find(r => r.state.resistance >= 200 && r.state.resistance <= 400);
                    if (activeLed && activeRes) {
                        loadLoopIntact = true;
                    }
                }
                updateStepStyle(step5, loadLoopIntact, steps[4].title, !bothFullyFormed);
            }
            else if (currentTutorial === 'solar_charge') {
                const step1 = document.getElementById('step-1');
                const step2 = document.getElementById('step-2');
                const step3 = document.getElementById('step-3');
                const step4 = document.getElementById('step-4');

                const solar = components.find(c => c.type === 'solar_panel');
                const caps = components.filter(c => c.type === 'capacitor');
                const switches = components.filter(c => c.type === 'spst_switch');

                const step1Passed = (solar && caps.length > 0 && switches.length > 0);
                updateStepStyle(step1, step1Passed, steps[0].title);
                if (!step1Passed) {
                    updateStepStyle(step2, false, steps[1].title, true);
                    updateStepStyle(step3, false, steps[2].title, true);
                    updateStepStyle(step4, false, steps[3].title, true);
                    return;
                }

                let loopPassed = false;
                const sPos_t = solar.terminals.find(t => t.label === '+');
                const sNeg_t = solar.terminals.find(t => t.label === '-');
                const capPos_t = caps[0].terminals.find(t => t.label === '+');
                const capNeg_t = caps[0].terminals.find(t => t.label === '-');
                const swIn_t = switches[0].terminals.find(t => t.label === 'In');
                const swOut_t = switches[0].terminals.find(t => t.label === 'Out');

                if (sPos_t && sNeg_t && capPos_t && capNeg_t && swIn_t && swOut_t) {
                    const sPos = nodeMap[sPos_t.id];
                    const sNeg = nodeMap[sNeg_t.id];
                    const capPos = nodeMap[capPos_t.id];
                    const capNeg = nodeMap[capNeg_t.id];
                    const swIn = nodeMap[swIn_t.id];
                    const swOut = nodeMap[swOut_t.id];

                    const positiveTrack = (sPos === swIn && swOut === capPos) || (sPos === swOut && swIn === capPos);
                    const groundTrack = (sNeg === capNeg && sNeg !== undefined);
                    if (positiveTrack && groundTrack) loopPassed = true;
                }
                updateStepStyle(step2, loopPassed, steps[1].title, !step1Passed);
                if (!loopPassed) {
                    updateStepStyle(step3, false, steps[2].title, true);
                    updateStepStyle(step4, false, steps[3].title, true);
                    return;
                }

                const sunPassed = solar.state.sunlight >= 95;
                updateStepStyle(step3, sunPassed, steps[2].title, !loopPassed);
                if (!sunPassed) {
                    updateStepStyle(step4, false, steps[3].title, true);
                    return;
                }

                const capCharged = caps.some(c => c.state.storedVoltage > 10.0);
                updateStepStyle(step4, capCharged, steps[3].title, !sunPassed);
            }
            else if (currentTutorial === 'class_a_amp') {
                const step1 = document.getElementById('step-1');
                const step2 = document.getElementById('step-2');
                const step3 = document.getElementById('step-3');
                const step4 = document.getElementById('step-4');
                const step5 = document.getElementById('step-5');

                const gen = components.find(c => c.type === 'signal_generator');
                const npn = components.find(c => c.type === 'npn_transistor');
                const resistors = components.filter(c => c.type === 'resistor');
                const meters = components.filter(c => c.type === 'multimeter');
                const pwr = components.find(c => c.type === 'usb_power');

                const step1Passed = (gen && npn && resistors.length >= 1 && meters.length >= 1);
                updateStepStyle(step1, step1Passed, steps[0].title);
                if (!step1Passed) {
                    updateStepStyle(step2, false, steps[1].title, true);
                    updateStepStyle(step3, false, steps[2].title, true);
                    updateStepStyle(step4, false, steps[3].title, true);
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                let step2Passed = false;
                if (pwr && resistors.length > 0) {
                    const vbus_t = pwr.terminals.find(t => t.label === '5V');
                    const gnd_t = pwr.terminals.find(t => t.label === 'GND');
                    const r1A_t = resistors[0].terminals.find(t => t.label === 'A');
                    const r1B_t = resistors[0].terminals.find(t => t.label === 'B');
                    const coll_t = npn.terminals.find(t => t.label === 'C');
                    const emit_t = npn.terminals.find(t => t.label === 'E');

                    if (vbus_t && gnd_t && r1A_t && r1B_t && coll_t && emit_t) {
                        const vbus = nodeMap[vbus_t.id];
                        const gnd = nodeMap[gnd_t.id];
                        const r1A = nodeMap[r1A_t.id];
                        const r1B = nodeMap[r1B_t.id];
                        const coll = nodeMap[coll_t.id];
                        const emit = nodeMap[emit_t.id];

                        const pullUp = (vbus === r1A && r1B === coll) || (vbus === r1B && r1A === coll);
                        const groundedEmit = (emit === gnd && emit !== undefined);
                        if (pullUp && groundedEmit) step2Passed = true;
                    }
                }
                updateStepStyle(step2, step2Passed, steps[1].title, !step1Passed);
                if (!step2Passed) {
                    updateStepStyle(step3, false, steps[2].title, true);
                    updateStepStyle(step4, false, steps[3].title, true);
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                let step3Passed = false;
                const sigPos_t = gen.terminals.find(t => t.label === '+');
                const sigNeg_t = gen.terminals.find(t => t.label === '-');
                const base_t = npn.terminals.find(t => t.label === 'B');
                const gnd_t = pwr ? pwr.terminals.find(t => t.label === 'GND') : null;

                if (sigPos_t && sigNeg_t && base_t && gnd_t) {
                    const sigPos = nodeMap[sigPos_t.id];
                    const sigNeg = nodeMap[sigNeg_t.id];
                    const base = nodeMap[base_t.id];
                    const gnd = nodeMap[gnd_t.id];

                    if (sigPos === base && sigNeg === gnd && sigPos !== undefined) step3Passed = true;
                }
                updateStepStyle(step3, step3Passed, steps[2].title, !step2Passed);
                if (!step3Passed) {
                    updateStepStyle(step4, false, steps[3].title, true);
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                let step4Passed = false;
                const coll_t = npn.terminals.find(t => t.label === 'C');
                const mRed_t = meters[0].terminals.find(t => t.label === 'VΩ+');
                const mBlack_t = meters[0].terminals.find(t => t.label === 'COM-');
                const pwrGnd_t = pwr ? pwr.terminals.find(t => t.label === 'GND') : null;

                if (coll_t && mRed_t && mBlack_t && pwrGnd_t) {
                    const coll = nodeMap[coll_t.id];
                    const gnd = nodeMap[pwrGnd_t.id];
                    const mRed = nodeMap[mRed_t.id];
                    const mBlack = nodeMap[mBlack_t.id];

                    if (mRed === coll && mBlack === gnd && mRed !== undefined) step4Passed = true;
                }
                updateStepStyle(step4, step4Passed, steps[3].title, !step3Passed);
                if (!step4Passed) {
                    updateStepStyle(step5, false, steps[4].title, true);
                    return;
                }

                const r1 = resistors[0];
                const rightResistance = r1.state.resistance >= 800 && r1.state.resistance <= 1200;
                const vC = npn.terminals.find(t => t.label === 'C').voltage;
                const amplifies = rightResistance && (vC > 0.5 && vC < 4.5);
                updateStepStyle(step5, amplifies, steps[4].title, !step4Passed);
            }
        }

        function updateStepStyle(el, passed, titleText, locked = false) {
            if (!el) return;
            const badge = el.querySelector('.status-badge');
            const title = el.querySelector('span:first-child');
            title.innerText = titleText;

            if (locked) {
                el.className = "p-3 bg-slate-950 rounded border-l-4 border-slate-800 space-y-1 opacity-60";
                badge.innerText = "Locked";
                badge.className = "status-badge text-slate-500";
                return;
            }

            el.className = passed 
                ? "p-3 bg-emerald-950/30 rounded border-l-4 border-emerald-500 space-y-1" 
                : "p-3 bg-slate-800/80 rounded border-l-4 border-amber-500 space-y-1";

            badge.innerText = passed ? "Completed" : "In Progress";
            badge.className = passed ? "status-badge text-emerald-400" : "status-badge text-amber-500";
        }
    </script>
</body>
