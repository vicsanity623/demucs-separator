<!DOCTYPE html>
<html lang="en" class="h-full select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DIY Electronics & Electrochemical Workbench</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .digital-font {
            font-family: 'Orbitron', monospace;
        }
        .workspace-grid {
            background-color: #0f172a;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 20px 20px;
        }
        /* Mobile terminal touch area amplification */
        .term-node::after {
            content: '';
            position: absolute;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
        }
    </style>
</head>
<body class="h-full bg-slate-950 text-slate-100 flex flex-col overflow-hidden">

    <!-- Header Panel -->
    <header class="bg-slate-900 border-b border-slate-800 px-4 md:px-6 py-3 flex flex-shrink-0 justify-between items-center z-20">
        <div>
            <h1 class="text-md md:text-xl font-bold tracking-tight text-teal-400">DIY Workbench</h1>
            <p class="hidden sm:block text-xs text-slate-400">Simulating chemistry, semiconductors, power systems, and analog audio</p>
        </div>
        <div class="flex items-center gap-2 md:gap-4">
            <button id="btn-play-pause" class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-xs md:text-sm px-3 md:px-4 py-1.5 md:py-2 rounded shadow transition-colors flex items-center gap-1.5">
                <span id="play-icon">⏸</span> <span id="play-text">Pause</span>
            </button>
            <button id="btn-clear" class="bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700 font-medium text-xs md:text-sm px-3 md:px-4 py-1.5 md:py-2 rounded transition-colors">
                Clear
            </button>
        </div>
    </header>

    <!-- Mobile Top Navigation Tab Bar -->
    <nav class="md:hidden bg-slate-900 border-b border-slate-800 flex justify-around items-center text-xs font-semibold h-11 flex-shrink-0 z-20">
        <button onclick="switchMobileTab('workspace')" id="tab-workspace" class="flex-1 h-full text-center border-b-2 border-teal-500 text-teal-400">
            Workspace
        </button>
        <button onclick="switchMobileTab('parts')" id="tab-parts" class="flex-1 h-full text-center border-b-2 border-transparent text-slate-400">
            Parts Bin
        </button>
        <button onclick="switchMobileTab('guide')" id="tab-guide" class="flex-1 h-full text-center border-b-2 border-transparent text-slate-400">
            Tutorial Guide
        </button>
    </nav>

    <!-- Main Container -->
    <div class="flex flex-1 overflow-hidden relative">
        
        <!-- Left Sidebar: Component Bin -->
        <aside id="panel-parts" class="hidden md:flex w-full md:w-80 bg-slate-900 border-r border-slate-800 flex-col p-4 overflow-y-auto flex-shrink-0 z-10 absolute md:static inset-0">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-2">Component Bin</h2>
            <p class="text-xs text-slate-400 mb-4">Select a component to instantiate it onto the grid:</p>
            
            <div class="space-y-4 pb-8">
                <!-- Group: Power & Sources -->
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Power Sources</h3>
                    <div class="space-y-2">
                        <button onclick="addAndFocusComponent('usb_power')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-indigo-900/50 flex items-center justify-center border border-indigo-700 text-base">🔌</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">5V USB Power Supply</div>
                                <div class="text-[10px] text-slate-400">Fixed DC VBUS / GND rails</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('solar_panel')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-amber-900/40 flex items-center justify-center border border-amber-700 text-base">☀️</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">12V Solar Panel</div>
                                <div class="text-[10px] text-slate-400">Voltage dependent on Sunlight slider</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('signal_generator')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-purple-900/40 flex items-center justify-center border border-purple-700 text-base">〰️</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">AC Signal Generator</div>
                                <div class="text-[10px] text-slate-400">Outputs 0.5Hz Sine wave</div>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Group: Passive & Components -->
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Passives & Actuators</h3>
                    <div class="space-y-2">
                        <button onclick="addAndFocusComponent('resistor')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-amber-900/50 flex items-center justify-center border border-amber-700 text-base">⚙️</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">Variable Resistor</div>
                                <div class="text-[10px] text-slate-400">Resistance limits current flow</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('capacitor')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-cyan-900/40 flex items-center justify-center border border-cyan-700 text-base">🔋</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">Capacitor (1000 µF)</div>
                                <div class="text-[10px] text-slate-400">Stores energy. Dynamic companion model</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('led')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-emerald-900/50 flex items-center justify-center border border-emerald-700 text-base">💡</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">LED Indicator</div>
                                <div class="text-[10px] text-slate-400">Visual indicator. Burns out above 45mA</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('spst_switch')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-slate-700/50 flex items-center justify-center border border-slate-600 text-base">🎛️</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">SPST Switch</div>
                                <div class="text-[10px] text-slate-400">Toggles loop connection on or off</div>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Group: Chemistry & Semiconductors -->
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Electrochemistry & Silicon</h3>
                    <div class="space-y-2">
                        <button onclick="addAndFocusComponent('diy_cell')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-teal-900/50 flex items-center justify-center border border-teal-700 text-base">🧪</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">DIY Epsom-Salt Cell</div>
                                <div class="text-[10px] text-slate-400">Modified Planté lead battery chemistry</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('npn_transistor')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-rose-950/60 flex items-center justify-center border border-rose-900/50 text-base">📉</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">NPN Transistor (C2001)</div>
                                <div class="text-[10px] text-slate-400">Bipolar semiconductor for amplification</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('pnp_transistor')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-rose-950/60 flex items-center justify-center border border-rose-900/50 text-base">📈</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">PNP Transistor</div>
                                <div class="text-[10px] text-slate-400">Bipolar semiconductor (inverse bias)</div>
                            </div>
                        </button>
                        <button onclick="addAndFocusComponent('mosfet_n')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-blue-950/60 flex items-center justify-center border border-blue-900/50 text-base">🧱</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">N-Channel MOSFET</div>
                                <div class="text-[10px] text-slate-400">High-power switch / regulator element</div>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Group: Measurement -->
                <div>
                    <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2">Instrumentation</h3>
                    <div class="space-y-2">
                        <button onclick="addAndFocusComponent('multimeter')" class="w-full text-left p-2.5 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition flex items-center gap-3">
                            <div class="w-9 h-9 rounded bg-rose-900/50 flex items-center justify-center border border-rose-700 text-base">📟</div>
                            <div>
                                <div class="text-xs font-semibold text-slate-200">Digital Multimeter</div>
                                <div class="text-[10px] text-slate-400">Simulates real-time voltage/current paths</div>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Center Workspace Canvas -->
        <main id="workspace" class="flex-1 relative workspace-grid overflow-hidden touch-none">
            <!-- Connection SVG Layer -->
            <svg id="wire-layer" class="absolute inset-0 pointer-events-none w-full h-full z-0"></svg>
            
            <!-- Render Container -->
            <div id="components-container" class="absolute inset-0 z-10 pointer-events-none"></div>
        </main>

        <!-- Right Sidebar: Interactive Tutorial Guide -->
        <aside id="panel-guide" class="hidden md:flex w-full md:w-96 bg-slate-900 border-l border-slate-800 flex-col overflow-y-auto flex-shrink-0 z-10 absolute md:static inset-0">
            <div class="p-4 border-b border-slate-800">
                <label for="tutorial-select" class="text-[10px] font-bold text-teal-400 uppercase tracking-wider block mb-1">Select Guide Profile</label>
                <select id="tutorial-select" onchange="switchTutorial(this.value)" class="w-full bg-slate-950 text-slate-200 text-xs rounded border border-slate-800 p-2 outline-none font-semibold focus:border-teal-500">
                    <option value="lead_acid">1. DIY 4.0V Epsom-Salt Battery Pack</option>
                    <option value="solar_charge">2. 12V Solar Panel Charging Regulator</option>
                    <option value="class_a_amp">3. Single-Stage Class-A Audio Amplifier</option>
                </select>
            </div>

            <div class="p-4 space-y-4 text-xs text-slate-300 pb-16">
                <!-- Step Tracker list -->
                <div class="space-y-3" id="step-tracker">
                    <!-- Dynamic Step list injected here by JS -->
                </div>

                <!-- Live Physical State Card -->
                <div class="bg-slate-950 p-4 rounded-lg border border-slate-800 space-y-2">
                    <h3 class="text-xs font-semibold uppercase tracking-wider text-teal-400">Node Status & Metrics</h3>
                    <div class="space-y-1 text-slate-400" id="live-metrics">
                        <!-- Dynamic node parameter analysis -->
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- JavaScript Simulation Engine -->
    <script>
        // Global States
        let components = [];
        let wires = [];
        let simulationRunning = true;
        let activeWireStart = null;
        let mousePosition = { x: 0, y: 0 };
        let draggedComponent = null;
        let dragOffset = { x: 0, y: 0 };
        let lastVoltages = [];
        let currentMobileTab = 'workspace';
        let currentTutorial = 'lead_acid';
        let simulationTime = 0.0;

        // Element Queries
        const workspace = document.getElementById('workspace');
        const container = document.getElementById('components-container');
        const wireLayer = document.getElementById('wire-layer');
        const playPauseBtn = document.getElementById('btn-play-pause');
        const clearBtn = document.getElementById('btn-clear');

        // Tutorial Profiles
        const tutorialGuides = {
            lead_acid: {
                title: "Simulating the 4.0V Epsom-Salt Lead-Acid Battery",
                metricsTitle: "Electrochemical State",
                steps: [
                    { id: 'step-1', title: "Step 1: Placement", desc: "Place 1x USB Power Supply and 2x DIY Epsom-Salt Cells onto the workbench grid." },
                    { id: 'step-2', title: "Step 2: Series Battery Connection", desc: "Connect the Positive (+) terminal of Cell 1 to the Negative (-) terminal of Cell 2 to build a series battery network." },
                    { id: 'step-3', title: "Step 3: Current-Limiting Protection", desc: "Place a Resistor and adjust its resistance to 81Ω to prevent rapid thermal expansion or excessive charging current." },
                    { id: 'step-4', title: "Step 4: Electrochemical Forming Charge", desc: "Connect USB 5V to Resistor Terminal A, Resistor Terminal B to Cell 2 (+), and USB GND to Cell 1 (-). Wait for the cells to reach 100% forming state." },
                    { id: 'step-5', title: "Step 5: Safe Load Testing Loop", desc: "Disconnect charging wires. Change Resistor to 330Ω, add a Green LED. Connect Cell 2 (+) to Resistor Terminal A, Resistor Terminal B to LED Anode (+), and LED Cathode (-) to Cell 1 (-) to complete the closed discharge circuit." }
                ],
                liveMetrics: () => {
                    const cells = components.filter(c => c.type === 'diy_cell');
                    if (cells.length === 0) return `<div>No electrochemical cells on workbench.</div>`;
                    return cells.map((c, i) => `
                        <div class="border-b border-slate-800 pb-1.5 mb-1.5">
                            <div class="font-bold text-slate-300">${c.state.name || 'Cell ' + (i+1)}</div>
                            <div class="flex justify-between"><span>Forming Level:</span><span>${Math.round(c.state.forming)}%</span></div>
                            <div class="flex justify-between"><span>Charge Level:</span><span>${Math.round(c.state.charge)}%</span></div>
                            <div class="flex justify-between text-teal-400"><span>Open EMF:</span><span>${(c.state.voltage).toFixed(2)} V</span></div>
                        </div>
                    `).join('');
                }
            },
            solar_charge: {
                title: "12V Solar Charging Regulator System",
                metricsTitle: "Power System Metrics",
                steps: [
                    { id: 'step-1', title: "Step 1: Place Charging System Components", desc: "Add 1x 12V Solar Panel, 1x Capacitor, and 1x SPST Switch to the workbench." },
                    { id: 'step-2', title: "Step 2: Connect Storage Capacitor", desc: "Connect Solar Panel (+) to Switch Terminal 'In', Switch Terminal 'Out' to Capacitor (+), and complete the ground loop by linking Solar Panel (-) to Capacitor (-)." },
                    { id: 'step-3', title: "Step 3: Adjust Environmental Sunlight", desc: "Drag the Solar Panel Sunlight Slider up to 100% to generate 12.0V open circuit voltage." },
                    { id: 'step-4', title: "Step 4: Store Power (Transient Charge)", desc: "Click/tap the SPST switch to close the circuit (ON). Observe the dynamic charge curve of the capacitor storing charge up to 12.0V." }
                ],
                liveMetrics: () => {
                    const caps = components.filter(c => c.type === 'capacitor');
                    const solar = components.find(c => c.type === 'solar_panel');
                    let html = '';
                    if (solar) {
                        html += `<div class="flex justify-between"><span>Solar Output:</span><span>${solar.state.voltage.toFixed(2)} V</span></div>`;
                    }
                    if (caps.length > 0) {
                        html += caps.map((cap, i) => `
                            <div class="mt-1 border-t border-slate-800 pt-1.5">
                                <div class="flex justify-between"><span>Capacitor Stored Voltage:</span><span class="text-cyan-400">${cap.state.storedVoltage.toFixed(2)} V</span></div>
                                <div class="flex justify-between"><span>Stored Charge (Q):</span><span>${(cap.state.storedVoltage * 0.001 * 1000).toFixed(1)} mC</span></div>
                            </div>
                        `).join('');
                    } else {
                        html += `<div class="text-slate-500 italic mt-1">No storage capacitors present.</div>`;
                    }
                    return html;
                }
            },
            class_a_amp: {
                title: "Class-A Common-Emitter BJT Amplifier",
                metricsTitle: "Signal Analysis (0.5Hz)",
                steps: [
                    { id: 'step-1', title: "Step 1: Place Signal Components", desc: "Add 1x AC Signal Generator, 1x NPN Transistor (C2001), 2x Resistors, and 1x Multimeter." },
                    { id: 'step-2', title: "Step 2: Pull-Up Collector Network", desc: "Add a USB Power Supply. Connect USB 5V to Resistor 1 Terminal A, and Resistor 1 Terminal B to Transistor Collector (C). Connect Emitter (E) to USB GND." },
                    { id: 'step-3', title: "Step 3: Connect Signal Input", desc: "Connect Signal Generator Positive (+) to Transistor Base (B), and Negative (-) to USB GND." },
                    { id: 'step-4', title: "Step 4: Connect Collector Scope Meter", desc: "Connect Multimeter Red (+) to Transistor Collector (C), and Black (-) to USB GND. Set Multimeter mode to Voltage (V)." },
                    { id: 'step-5', title: "Step 5: Observe Signal Inversion", desc: "Set Resistor 1 to 1kΩ. Observe the Collector voltage swinging opposite to the Base voltage, showing phase inversion and gain." }
                ],
                liveMetrics: () => {
                    const npn = components.find(c => c.type === 'npn_transistor');
                    const gen = components.find(c => c.type === 'signal_generator');
                    let html = '';
                    if (gen) {
                        html += `<div class="flex justify-between"><span>Input Signal:</span><span class="text-purple-400">${gen.state.outputVoltage.toFixed(2)} V</span></div>`;
                    }
                    if (npn) {
                        const vB = npn.terminals.find(t => t.label === 'B').voltage;
                        const vC = npn.terminals.find(t => t.label === 'C').voltage;
                        const vE = npn.terminals.find(t => t.label === 'E').voltage;
                        html += `
                            <div class="mt-1 border-t border-slate-800 pt-1.5 space-y-0.5">
                                <div class="flex justify-between"><span>Base Voltage (Vb):</span><span>${vB.toFixed(2)} V</span></div>
                                <div class="flex justify-between"><span>Collector Voltage (Vc):</span><span class="text-rose-400">${vC.toFixed(2)} V</span></div>
                                <div class="flex justify-between"><span>Emitter Voltage (Ve):</span><span>${vE.toFixed(2)} V</span></div>
                                <div class="flex justify-between"><span>Base Current (Ib):</span><span>${(npn.state.current_b * 1000).toFixed(2)} mA</span></div>
                            </div>
                        `;
                    } else {
                        html += `<div class="text-slate-500 italic mt-1">No NPN Transistor detected.</div>`;
                    }
                    return html;
                }
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            // Interaction Event Listeners
            workspace.addEventListener('mousemove', handlePointerMove);
            workspace.addEventListener('touchmove', handlePointerMove, { passive: false });
            workspace.addEventListener('mouseup', handlePointerUp);
            workspace.addEventListener('touchend', handlePointerUp);
            window.addEventListener('resize', updateWires);

            // Simulation Controls
            playPauseBtn.addEventListener('click', () => {
                simulationRunning = !simulationRunning;
                if (simulationRunning) {
                    playPauseBtn.className = "bg-emerald-600 hover:bg-emerald-500 text-white font-medium text-xs md:text-sm px-3 md:px-4 py-1.5 md:py-2 rounded shadow transition-colors flex items-center gap-1.5";
                    document.getElementById('play-icon').innerText = "⏸";
                    document.getElementById('play-text').innerText = "Pause";
                } else {
                    playPauseBtn.className = "bg-amber-600 hover:bg-amber-500 text-white font-medium text-xs md:text-sm px-3 md:px-4 py-1.5 md:py-2 rounded shadow transition-colors flex items-center gap-1.5";
                    document.getElementById('play-icon').innerText = "▶";
                    document.getElementById('play-text').innerText = "Resume";
                }
            });

            clearBtn.addEventListener('click', () => {
                components = [];
                wires = [];
                container.innerHTML = '';
                updateWires();
            });

            // Start Solver Loop
            setInterval(simulationTick, 100);
            
            // Initialize the default guide and layout
            switchMobileTab('workspace');
            switchTutorial('lead_acid');
        });

        // Responsive Mobile Layout Controller
        function switchMobileTab(tab) {
            currentMobileTab = tab;
            const pWorkspace = document.getElementById('workspace');
            const pParts = document.getElementById('panel-parts');
            const pGuide = document.getElementById('panel-guide');

            const tWorkspace = document.getElementById('tab-workspace');
            const tParts = document.getElementById('tab-parts');
            const tGuide = document.getElementById('tab-guide');

            pWorkspace.classList.add('hidden');
            pParts.classList.add('hidden');
            pGuide.classList.add('hidden');

            tWorkspace.className = "flex-1 h-full text-center border-b-2 border-transparent text-slate-400";
            tParts.className = "flex-1 h-full text-center border-b-2 border-transparent text-slate-400";
            tGuide.className = "flex-1 h-full text-center border-b-2 border-transparent text-slate-400";

            if (tab === 'workspace') {
                pWorkspace.classList.remove('hidden');
                tWorkspace.className = "flex-1 h-full text-center border-b-2 border-teal-500 text-teal-400";
                setTimeout(updateWires, 50);
            } else if (tab === 'parts') {
                pParts.classList.remove('hidden');
                pParts.classList.remove('md:flex');
                pParts.classList.add('flex');
                tParts.className = "flex-1 h-full text-center border-b-2 border-teal-500 text-teal-400";
            } else if (tab === 'guide') {
                pGuide.classList.remove('hidden');
                pGuide.classList.remove('md:flex');
                pGuide.classList.add('flex');
                tGuide.className = "flex-1 h-full text-center border-b-2 border-teal-500 text-teal-400";
            }
        }

        // Active Tutorial Switcher
        function switchTutorial(tutorialKey) {
            currentTutorial = tutorialKey;
            const config = tutorialGuides[tutorialKey];
            const tracker = document.getElementById('step-tracker');
            
            // Build tutorial checklist inside UI
            tracker.innerHTML = config.steps.map((s, idx) => `
                <div id="${s.id}" class="p-3 bg-slate-950 rounded border-l-4 border-slate-800 space-y-1 opacity-60">
                    <div class="flex justify-between font-semibold text-slate-400">
                        <span>${s.title}</span>
                        <span class="status-badge text-slate-500">Locked</span>
                    </div>
                    <p class="text-slate-500">${s.desc}</p>
                </div>
            `).join('');

            // Repopulate dynamic components for respective guides
            components = [];
            wires = [];
            container.innerHTML = '';
            lastVoltages = [];

            const wWidth = workspace.clientWidth || window.innerWidth;
            const startX = wWidth < 768 ? 20 : 60;

            if (tutorialKey === 'lead_acid') {
                addComponent('usb_power', startX, 40);
                addComponent('diy_cell', startX, 170);
                addComponent('diy_cell', startX, 320);
            } else if (tutorialKey === 'solar_charge') {
                addComponent('solar_panel', startX, 40);
                addComponent('capacitor', startX, 180);
                addComponent('spst_switch', startX, 320);
            } else if (tutorialKey === 'class_a_amp') {
                addComponent('usb_power', startX, 40);
                addComponent('signal_generator', startX, 170);
                addComponent('npn_transistor', startX, 310);
            }

            updateWires();
        }

        function addAndFocusComponent(type) {
            const rect = workspace.getBoundingClientRect();
            const spawnX = Math.max(10, (rect.width / 2) - 96);
            const spawnY = Math.max(10, (rect.height / 2) - 80);
            addComponent(type, spawnX, spawnY);
            if (window.innerWidth < 768) {
                switchMobileTab('workspace');
            }
        }

        // Component Assembly Logic
        function addComponent(type, customX = null, customY = null) {
            const id = type + '_' + Math.random().toString(36).substr(2, 9);
            const rect = workspace.getBoundingClientRect();
            const x = customX !== null ? customX : (rect.width / 2) - 96;
            const y = customY !== null ? customY : (rect.height / 2) - 80;

            let terminals = [];
            let state = {};

            switch (type) {
                case 'usb_power':
                    terminals = [
                        { id: id + '_t1', label: '5V', relX: 180, relY: 35, voltage: 5.0 },
                        { id: id + '_t2', label: 'GND', relX: 180, relY: 75, voltage: 0.0 }
                    ];
                    state = { name: "USB 5V Supply" };
                    break;
                case 'solar_panel':
                    terminals = [
                        { id: id + '_t1', label: '+', relX: 180, relY: 35, voltage: 0.0 },
                        { id: id + '_t2', label: '-', relX: 180, relY: 75, voltage: 0.0 }
                    ];
                    state = { sunlight: 50, voltage: 6.0 };
                    break;
                case 'signal_generator':
                    terminals = [
                        { id: id + '_t1', label: '+', relX: 180, relY: 55, voltage: 0.0 },
                        { id: id + '_t2', label: '-', relX: 20, relY: 55, voltage: 0.0 }
                    ];
                    state = { frequency: 0.5, amplitude: 2.0, outputVoltage: 0.0 };
                    break;
                case 'resistor':
                    terminals = [
                        { id: id + '_t1', label: 'A', relX: 20, relY: 65, voltage: 0.0 },
                        { id: id + '_t2', label: 'B', relX: 180, relY: 65, voltage: 0.0 }
                    ];
                    state = { resistance: 330 };
                    break;
                case 'capacitor':
                    terminals = [
                        { id: id + '_t1', label: '+', relX: 25, relY: 55, voltage: 0.0 },
                        { id: id + '_t2', label: '-', relX: 155, relY: 55, voltage: 0.0 }
                    ];
                    state = { capacitance: 1000, storedVoltage: 0.0 };
                    break;
                case 'led':
                    terminals = [
                        { id: id + '_anode', label: '+', relX: 30, relY: 75, voltage: 0.0 },
                        { id: id + '_cathode', label: '-', relX: 150, relY: 75, voltage: 0.0 }
                    ];
                    state = { blown: false, current: 0.0 };
                    break;
                case 'spst_switch':
                    terminals = [
                        { id: id + '_t1', label: 'In', relX: 25, relY: 55, voltage: 0.0 },
                        { id: id + '_t2', label: 'Out', relX: 155, relY: 55, voltage: 0.0 }
                    ];
                    state = { closed: false };
                    break;
                case 'diy_cell':
                    terminals = [
                        { id: id + '_anode', label: '+', relX: 25, relY: 35, voltage: 0.0 },
                        { id: id + '_cathode', label: '-', relX: 155, relY: 35, voltage: 0.0 }
                    ];
                    state = { 
                        forming: 0,
                        charge: 0,
                        voltage: 0.0,
                        current: 0.0,
                        name: components.filter(c => c.type === 'diy_cell').length === 0 ? "Cell 1" : "Cell 2"
                    };
                    break;
                case 'npn_transistor':
                case 'pnp_transistor':
                    terminals = [
                        { id: id + '_c', label: 'C', relX: 96, relY: 25, voltage: 0.0 },
                        { id: id + '_b', label: 'B', relX: 30, relY: 85, voltage: 0.0 },
                        { id: id + '_e', label: 'E', relX: 162, relY: 85, voltage: 0.0 }
                    ];
                    state = { current_b: 0.0, beta: 100 };
                    break;
                case 'mosfet_n':
                    terminals = [
                        { id: id + '_d', label: 'D', relX: 96, relY: 25, voltage: 0.0 },
                        { id: id + '_g', label: 'G', relX: 30, relY: 85, voltage: 0.0 },
                        { id: id + '_s', label: 'S', relX: 162, relY: 85, voltage: 0.0 }
                    ];
                    state = { threshold: 2.0 };
                    break;
                case 'multimeter':
                    terminals = [
                        { id: id + '_red', label: 'VΩ+', relX: 40, relY: 135, voltage: 0.0 },
                        { id: id + '_black', label: 'COM-', relX: 140, relY: 135, voltage: 0.0 }
                    ];
                    state = { mode: 'voltage', value: 0.0 };
                    break;
            }

            const comp = { id, type, x, y, terminals, state };
            components.push(comp);
            renderComponent(comp);
            updateWires();
        }

        // Render Component elements on CSS DOM
        function renderComponent(comp) {
            const div = document.createElement('div');
            div.id = comp.id;
            div.style.left = comp.x + 'px';
            div.style.top = comp.y + 'px';
            div.className = "absolute pointer-events-auto bg-slate-800 border border-slate-700 rounded-lg shadow-xl flex flex-col select-none z-10 w-48 touch-none";

            let headerBg = "bg-slate-700/50 border-b border-slate-600";
            if (comp.type === 'usb_power') headerBg = "bg-indigo-950/40 border-b border-indigo-900/50";
            if (comp.type === 'diy_cell') headerBg = "bg-teal-950/40 border-b border-teal-900/50";
            if (comp.type === 'multimeter') headerBg = "bg-rose-950/40 border-b border-rose-900/50";
            if (comp.type === 'solar_panel') headerBg = "bg-amber-950/40 border-b border-amber-900/50";

            let innerHtml = `
                <div class="px-3 py-2 flex justify-between items-center cursor-move rounded-t-lg ${headerBg} touch-none" 
                     onmousedown="startDrag(event, '${comp.id}')" 
                     ontouchstart="startDrag(event, '${comp.id}')">
                    <span class="text-xs font-semibold tracking-wide text-slate-200 uppercase">${getComponentTitle(comp)}</span>
                    <button onclick="removeComponent('${comp.id}')" class="text-slate-400 hover:text-rose-400 text-xs px-1.5 py-0.5 rounded transition">✕</button>
                </div>
                <div class="p-3 flex flex-col relative flex-1 gap-2 min-h-[85px]">
            `;

            switch (comp.type) {
                case 'usb_power':
                    innerHtml += `
                        <div class="flex flex-col items-center justify-center py-2">
                            <div class="text-[10px] text-slate-400">USB Native Output</div>
                            <div class="text-emerald-400 digital-font text-lg font-bold">5.00 V</div>
                        </div>
                    `;
                    break;
                case 'solar_panel':
                    innerHtml += `
                        <div class="flex flex-col gap-1 text-[10px]">
                            <div class="flex justify-between"><span>Sunlight:</span><span id="${comp.id}-sun-pct" class="font-bold text-amber-400">50%</span></div>
                            <input type="range" min="0" max="100" value="${comp.state.sunlight}" class="w-full accent-amber-500 h-1 bg-slate-950 rounded-lg appearance-none cursor-pointer" oninput="updateSolarPanel('${comp.id}', this.value)">
                            <div class="flex justify-between mt-1 text-slate-400"><span>Voltage:</span><span id="${comp.id}-readout" class="font-bold text-slate-200">6.00 V</span></div>
                        </div>
                    `;
                    break;
                case 'signal_generator':
                    innerHtml += `
                        <div class="flex flex-col items-center justify-center py-1">
                            <div class="text-[9px] text-slate-400">0.5Hz Generator</div>
                            <div class="digital-font text-purple-400 text-sm font-bold animate-pulse" id="${comp.id}-out">0.00 V</div>
                        </div>
                    `;
                    break;
                case 'diy_cell':
                    innerHtml += `
                        <div class="flex flex-col gap-1.5 text-[10px] text-slate-300">
                            <div class="font-medium text-slate-400 border-b border-slate-700 pb-1 flex justify-between">
                                <span>Name:</span> 
                                <input type="text" class="bg-transparent text-right outline-none text-slate-200 w-20 border border-transparent focus:border-slate-700 px-0.5 rounded" value="${comp.state.name}" oninput="comp.state.name = this.value">
                            </div>
                            <div class="flex justify-between"><span>Forming Level:</span> <span id="${comp.id}-forming" class="font-semibold text-amber-400">0%</span></div>
                            <div class="w-full bg-slate-900 rounded-full h-1 overflow-hidden">
                                <div id="${comp.id}-forming-bar" class="bg-amber-500 h-1 transition-all duration-300" style="width: 0%"></div>
                            </div>
                            <div class="flex justify-between"><span>State of Charge:</span> <span id="${comp.id}-charge" class="font-semibold text-teal-400">0%</span></div>
                            <div class="w-full bg-slate-900 rounded-full h-1 overflow-hidden">
                                <div id="${comp.id}-charge-bar" class="bg-teal-500 h-1 transition-all duration-300" style="width: 0%"></div>
                            </div>
                            <div class="flex justify-between mt-1 text-slate-400"><span>EMF:</span> <span id="${comp.id}-voltage" class="font-bold text-slate-200">0.00 V</span></div>
                            <div class="flex justify-between text-slate-400"><span>Net Loop:</span> <span id="${comp.id}-current" class="font-bold text-slate-200">0.0 mA</span></div>
                            <div id="${comp.id}-bubbling" class="hidden text-center text-[9px] bg-sky-950/50 border border-sky-800 text-sky-400 py-0.5 rounded animate-pulse mt-1">💨 Bubble Gassing Detected</div>
                        </div>
                    `;
                    break;
                case 'resistor':
                    innerHtml += `
                        <div class="flex flex-col gap-2">
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-slate-400">Value (Ω):</span>
                                <input type="number" id="${comp.id}-val-input" min="1" max="10000" class="w-20 bg-slate-950 border border-slate-700 rounded text-center text-xs text-slate-100 py-0.5 font-semibold" value="${comp.state.resistance}" onchange="updateResistorVal('${comp.id}', this.value)">
                            </div>
                            <div class="h-5 w-full bg-orange-100/10 rounded flex items-center justify-around px-4 border border-slate-700 relative">
                                <div class="absolute h-0.5 w-full bg-slate-600 left-0 z-0"></div>
                                <div class="w-4 h-4 bg-amber-200 rounded-sm z-10 flex justify-between px-0.5 relative">
                                    <div id="${comp.id}-band1" class="w-1 h-full bg-red-600"></div>
                                    <div id="${comp.id}-band2" class="w-1 h-full bg-purple-600"></div>
                                    <div id="${comp.id}-band3" class="w-1 h-full bg-orange-600"></div>
                                    <div class="w-1 h-full bg-amber-500"></div>
                                </div>
                            </div>
                        </div>
                    `;
                    break;
                case 'capacitor':
                    innerHtml += `
                        <div class="flex flex-col gap-1 text-[10px]">
                            <div class="flex justify-between"><span>Stored EMF:</span><span id="${comp.id}-stored-emf" class="font-bold text-cyan-400">0.00 V</span></div>
                            <div class="flex justify-between"><span>Value:</span><span class="text-slate-400">1000 µF</span></div>
                            <div class="w-full bg-slate-900 rounded-full h-1.5 overflow-hidden mt-1">
                                <div id="${comp.id}-charge-bar" class="bg-cyan-500 h-1.5 transition-all duration-300" style="width: 0%"></div>
                            </div>
                        </div>
                    `;
                    break;
                case 'led':
                    innerHtml += `
                        <div class="flex flex-col items-center gap-2 py-1">
                            <div class="relative w-8 h-8 rounded-full border border-slate-700 flex items-center justify-center transition-all duration-300" id="${comp.id}-bulb">
                                <div class="w-4 h-4 rounded-full bg-slate-600" id="${comp.id}-bulb-inner"></div>
                            </div>
                            <div class="text-[10px] text-center text-slate-400" id="${comp.id}-status">Off</div>
                            <button id="${comp.id}-reset" class="hidden bg-slate-950 hover:bg-slate-900 border border-slate-700 text-rose-400 px-2 py-1 text-[9px] rounded" onclick="resetBlownLed('${comp.id}')">Replace LED</button>
                        </div>
                    `;
                    break;
                case 'multimeter':
                    innerHtml += `
                        <div class="bg-rose-950 border border-rose-900 rounded p-2 flex flex-col items-center">
                            <div class="text-[11px] text-teal-400 font-bold digital-font text-center bg-black/80 w-full rounded py-1 border border-teal-950/50 min-h-[28px]" id="${comp.id}-display">
                                0.00 V
                            </div>
                            <div class="flex gap-2 mt-2 w-full justify-center">
                                <button id="${comp.id}-mode-v" class="bg-slate-950 text-slate-300 text-[10px] px-2.5 py-1 rounded font-bold border border-emerald-600" onclick="setMultimeterMode('${comp.id}', 'voltage')">V</button>
                                <button id="${comp.id}-mode-a" class="bg-slate-950 text-slate-500 text-[10px] px-2.5 py-1 rounded font-bold border border-transparent" onclick="setMultimeterMode('${comp.id}', 'current')">mA</button>
                            </div>
                        </div>
                    `;
                    break;
                case 'spst_switch':
                    innerHtml += `
                        <div class="flex flex-col items-center gap-2 py-1">
                            <div class="text-[10px] text-slate-400">Manual Contact Switch</div>
                            <button id="${comp.id}-toggle" class="px-4 py-2 bg-rose-900/40 border border-rose-800 text-rose-400 rounded-md text-xs font-bold w-full transition" onclick="toggleSwitch('${comp.id}')">
                                OPEN (OFF)
                            </button>
                        </div>
                    `;
                    break;
                case 'npn_transistor':
                case 'pnp_transistor':
                    innerHtml += `
                        <div class="flex flex-col items-center py-1">
                            <div class="text-[10px] text-slate-300 font-mono">BJT (TO-92 Package)</div>
                            <div class="text-[9px] text-slate-500 mt-1">Emitters / Base control</div>
                        </div>
                    `;
                    break;
                case 'mosfet_n':
                    innerHtml += `
                        <div class="flex flex-col items-center py-1">
                            <div class="text-[10px] text-slate-300 font-mono">TO-220 MOSFET</div>
                            <div class="text-[9px] text-slate-500 mt-1">Threshold: Vgs > 2.0V</div>
                        </div>
                    `;
                    break;
            }

            innerHtml += `</div>`;

            // Append Connection Terminal Ports
            comp.terminals.forEach((term) => {
                innerHtml += `
                    <div id="${term.id}" 
                         data-comp-id="${comp.id}" 
                         data-term-id="${term.id}" 
                         class="term-node absolute w-5 h-5 bg-slate-900 border-2 border-slate-600 rounded-full cursor-pointer hover:border-teal-400 flex items-center justify-center text-[8px] text-slate-300 z-20 pointer-events-auto"
                         style="left: ${term.relX - 10}px; top: ${term.relY - 10}px;"
                         onmousedown="startWire(event, '${term.id}')"
                         ontouchstart="startWire(event, '${term.id}')">
                        ${term.label}
                    </div>
                `;
            });

            div.innerHTML = innerHtml;
            container.appendChild(div);

            if (comp.type === 'resistor') {
                updateResistorBands(comp);
            }
        }

        function getComponentTitle(comp) {
            switch (comp.type) {
                case 'usb_power': return "USB 5V Supply";
                case 'diy_cell': return comp.state.name || "DIY Cell";
                case 'resistor': return "Resistor";
                case 'led': return "LED Indicator";
                case 'multimeter': return "DMM Unit";
                case 'spst_switch': return "Switch";
                case 'solar_panel': return "Solar Panel";
                case 'signal_generator': return "AC Signal Gen";
                case 'capacitor': return "Capacitor";
                case 'npn_transistor': return "NPN Transistor";
                case 'pnp_transistor': return "PNP Transistor";
                case 'mosfet_n': return "N-MOSFET";
            }
        }

        function removeComponent(id) {
            components = components.filter(c => c.id !== id);
            wires = wires.filter(w => !w.from.startsWith(id) && !w.to.startsWith(id));
            const el = document.getElementById(id);
            if (el) el.remove();
            updateWires();
        }

        function updateSolarPanel(id, value) {
            const comp = components.find(c => c.id === id);
            if (comp) {
                comp.state.sunlight = parseInt(value);
                comp.state.voltage = (12.0 * (comp.state.sunlight / 100));
                document.getElementById(`${id}-sun-pct`).innerText = comp.state.sunlight + '%';
                document.getElementById(`${id}-readout`).innerText = comp.state.voltage.toFixed(2) + ' V';
            }
        }

        // Variable Resistor Helpers
        function updateResistorVal(id, val) {
            const comp = components.find(c => c.id === id);
            if (comp) {
                let r = parseInt(val);
                if (isNaN(r) || r < 1) r = 1;
                if (r > 10000) r = 10000;
                comp.state.resistance = r;
                document.getElementById(`${id}-val-input`).value = r;
                updateResistorBands(comp);
            }
        }

        function updateResistorBands(comp) {
            const val = comp.state.resistance;
            const bands = getResistorColorBands(val);
            const b1 = document.getElementById(`${comp.id}-band1`);
            const b2 = document.getElementById(`${comp.id}-band2`);
            const b3 = document.getElementById(`${comp.id}-band3`);
            
            if (b1 && b2 && b3) {
                b1.style.backgroundColor = bands[0];
                b2.style.backgroundColor = bands[1];
                b3.style.backgroundColor = bands[2];
            }
        }

        function getResistorColorBands(val) {
            const colors = ["#000000", "#78350f", "#dc2626", "#ea580c", "#eab308", "#16a34a", "#2563eb", "#9333ea", "#4b5563", "#ffffff"];
            if (val < 10) {
                return [colors[val], colors[0], colors[0]];
            }
            const str = val.toString();
            const d1 = parseInt(str[0]);
            const d2 = parseInt(str[1]);
            const multiplier = str.length - 2;
            return [colors[d1] || "#000", colors[d2] || "#000", colors[multiplier] || "#000"];
        }

        // Multimeter Helpers
        function setMultimeterMode(id, mode) {
            const comp = components.find(c => c.id === id);
            if (comp) {
                comp.state.mode = mode;
                const bV = document.getElementById(`${id}-mode-v`);
                const bA = document.getElementById(`${id}-mode-a`);
                if (mode === 'voltage') {
                    bV.className = "bg-slate-950 text-slate-300 text-[10px] px-2.5 py-1 rounded font-bold border border-emerald-600";
                    bA.className = "bg-slate-950 text-slate-500 text-[10px] px-2.5 py-1 rounded font-bold border border-transparent";
                } else {
                    bA.className = "bg-slate-950 text-slate-300 text-[10px] px-2.5 py-1 rounded font-bold border border-emerald-600";
                    bV.className = "bg-slate-950 text-slate-500 text-[10px] px-2.5 py-1 rounded font-bold border border-transparent";
                }
            }
        }

        // LED Reset handler
        function resetBlownLed(id) {
            const comp = components.find(c => c.id === id);
            if (comp) {
                comp.state.blown = false;
                document.getElementById(`${id}-reset`).classList.add('hidden');
                document.getElementById(`${id}-status`).innerText = "Off";
                document.getElementById(`${id}-status`).className = "text-[10px] text-center text-slate-400";
            }
        }

        function toggleSwitch(id) {
            const comp = components.find(c => c.id === id);
            if (comp) {
                comp.state.closed = !comp.state.closed;
                const btn = document.getElementById(`${id}-toggle`);
                if (comp.state.closed) {
                    btn.innerText = "CLOSED (ON)";
                    btn.className = "px-4 py-2 bg-emerald-900/40 border border-emerald-800 text-emerald-400 rounded-md text-xs font-bold w-full transition";
                } else {
                    btn.innerText = "OPEN (OFF)";
                    btn.className = "px-4 py-2 bg-rose-900/40 border border-rose-800 text-rose-400 rounded-md text-xs font-bold w-full transition";
                }
            }
        }

        // Unified input resolution coordinate processor
        function getPointerCoords(e) {
            const rect = workspace.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top,
                    clientX: e.touches[0].clientX,
                    clientY: e.touches[0].clientY
                };
            } else if (e.changedTouches && e.changedTouches.length > 0) {
                return {
                    x: e.changedTouches[0].clientX - rect.left,
                    y: e.changedTouches[0].clientY - rect.top,
                    clientX: e.changedTouches[0].clientX,
                    clientY: e.changedTouches[0].clientY
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top,
                clientX: e.clientX,
                clientY: e.clientY
            };
        }

        // Dragging Event Handlers
        function startDrag(e, compId) {
            if (e.target.tagName.toLowerCase() === 'button' || e.target.tagName.toLowerCase() === 'input') return;
            const comp = components.find(c => c.id === compId);
            if (comp) {
                const coords = getPointerCoords(e);
                draggedComponent = comp;
                dragOffset.x = coords.clientX - comp.x;
                dragOffset.y = coords.clientY - comp.y;
                
                document.addEventListener('mousemove', handleDrag);
                document.addEventListener('touchmove', handleDrag, { passive: false });
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchend', endDrag);
            }
        }

        function handleDrag(e) {
            if (draggedComponent) {
                e.preventDefault();
                const rect = workspace.getBoundingClientRect();
                const coords = getPointerCoords(e);
                
                let newX = coords.clientX - dragOffset.x;
                let newY = coords.clientY - dragOffset.y;
                
                newX = Math.max(0, Math.min(newX, rect.width - 192));
                newY = Math.max(0, Math.min(newY, rect.height - 150));

                draggedComponent.x = newX;
                draggedComponent.y = newY;

                const el = document.getElementById(draggedComponent.id);
                if (el) {
                    el.style.left = newX + 'px';
                    el.style.top = newY + 'px';
                }
                updateWires();
            }
        }

        function endDrag() {
            draggedComponent = null;
            document.removeEventListener('mousemove', handleDrag);
            document.removeEventListener('touchmove', handleDrag);
            document.removeEventListener('mouseup', endDrag);
            document.removeEventListener('touchend', endDrag);
        }

        // Wiring/Connection Handling
        function startWire(e, termId) {
            e.stopPropagation();
            activeWireStart = termId;
            const coords = getPointerCoords(e);
            mousePosition.x = coords.x;
            mousePosition.y = coords.y;
        }

        function handlePointerMove(e) {
            if (activeWireStart) {
                e.preventDefault();
                const coords = getPointerCoords(e);
                mousePosition.x = coords.x;
                mousePosition.y = coords.y;
                updateWires();
            }
        }

        function handlePointerUp(e) {
            if (activeWireStart) {
                const coords = getPointerCoords(e);
                const el = document.elementFromPoint(coords.clientX, coords.clientY);
                if (el && el.dataset && el.dataset.termId) {
                    const termId = el.dataset.termId;
                    if (termId !== activeWireStart) {
                        const wireExists = wires.some(w => 
                            (w.from === activeWireStart && w.to === termId) || 
                            (w.from === termId && w.to === activeWireStart)
                        );
                        if (!wireExists) {
                            wires.push({ from: activeWireStart, to: termId });
                        }
                    }
                }
                activeWireStart = null;
                updateWires();
            }
        }

        function updateWires() {
            wireLayer.innerHTML = '';
            const rect = workspace.getBoundingClientRect();

            wires.forEach((wire, index) => {
                const elFrom = document.getElementById(wire.from);
                const elTo = document.getElementById(wire.to);
                if (elFrom && elTo) {
                    const rFrom = elFrom.getBoundingClientRect();
                    const rTo = elTo.getBoundingClientRect();
                    
                    const x1 = (rFrom.left + rFrom.width / 2) - rect.left;
                    const y1 = (rFrom.top + rFrom.height / 2) - rect.top;
                    const x2 = (rTo.left + rTo.width / 2) - rect.left;
                    const y2 = (rTo.top + rTo.height / 2) - rect.top;

                    const termData = getTerminalObj(wire.from);
                    let strokeColor = "#64748b";
                    if (termData) {
                        if (termData.voltage > 4.5) strokeColor = "#ef4444";
                        else if (termData.voltage <= 0.05) strokeColor = "#3b82f6";
                        else if (termData.voltage > 1.5) strokeColor = "#f59e0b";
                    }

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const controlOffset = Math.abs(x1 - x2) * 0.5;
                    path.setAttribute('d', `M ${x1} ${y1} C ${x1 + controlOffset} ${y1}, ${x2 - controlOffset} ${y2}, ${x2} ${y2}`);
                    path.setAttribute('stroke', strokeColor);
                    path.setAttribute('stroke-width', '4');
                    path.setAttribute('fill', 'none');
                    path.setAttribute('class', 'cursor-pointer hover:stroke-rose-500 pointer-events-auto transition-colors duration-150');
                    
                    path.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        wires.splice(index, 1);
                        updateWires();
                    });
                    
                    let lastTap = 0;
                    path.addEventListener('touchend', (e) => {
                        const currentTime = new Date().getTime();
                        const tapLength = currentTime - lastTap;
                        if (tapLength < 500 && tapLength > 0) {
                            wires.splice(index, 1);
                            updateWires();
                        }
                        lastTap = currentTime;
                    });

                    wireLayer.appendChild(path);
                }
            });

            if (activeWireStart) {
                const elFrom = document.getElementById(activeWireStart);
                if (elFrom) {
                    const rFrom = elFrom.getBoundingClientRect();
                    const x1 = (rFrom.left + rFrom.width / 2) - rect.left;
                    const y1 = (rFrom.top + rFrom.height / 2) - rect.top;
                    const x2 = mousePosition.x;
                    const y2 = mousePosition.y;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const controlOffset = Math.abs(x1 - x2) * 0.5;
                    path.setAttribute('d', `M ${x1} ${y1} C ${x1 + controlOffset} ${y1}, ${x2 - controlOffset} ${y2}, ${x2} ${y2}`);
                    path.setAttribute('stroke', '#2dd4bf');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('stroke-dasharray', '5,5');
                    path.setAttribute('fill', 'none');
                    wireLayer.appendChild(path);
                }
            }
        }

        function getTerminalObj(tId) {
            for (let c of components) {
                const t = c.terminals.find(term => term.id === tId);
                if (t) return t;
            }
            return null;
        }

        // Simulation solver updates and dynamic calculations
        function simulationTick() {
            if (!simulationRunning) return;

            simulationTime += 0.1; // Dynamic clock step

            const parent = {};
            function find(tId) {
                if (!parent[tId]) parent[tId] = tId;
                if (parent[tId] === tId) return tId;
                return parent[tId] = find(parent[tId]);
            }
            function union(tId1, tId2) {
                const root1 = find(tId1);
                const root2 = find(tId2);
                if (root1 !== root2) {
                    parent[root1] = root2;
                }
            }

            const allTerminals = [];
            components.forEach(comp => {
                comp.terminals.forEach(term => {
                    allTerminals.push(term.id);
                });
            });

            wires.forEach(wire => {
                union(wire.from, wire.to);
            });

            const nodeMap = {};
            let nodeCount = 0;
            allTerminals.forEach(tId => {
                const root = find(tId);
                if (nodeMap[root] === undefined) {
                    nodeMap[root] = nodeCount++;
                }
                nodeMap[tId] = nodeMap[root];
            });

            if (nodeCount === 0) return;

            // Pin ground reference
            let gndNodeIdx = -1;
            components.forEach(comp => {
                if (comp.type === 'usb_power') {
                    const gndTerm = comp.terminals.find(t => t.label === 'GND');
                    if (gndTerm) gndNodeIdx = nodeMap[gndTerm.id];
                } else if (comp.type === 'solar_panel' && gndNodeIdx === -1) {
                    const gndTerm = comp.terminals.find(t => t.label === '-');
                    if (gndTerm) gndNodeIdx = nodeMap[gndTerm.id];
                } else if (comp.type === 'signal_generator' && gndNodeIdx === -1) {
                    const gndTerm = comp.terminals.find(t => t.label === '-');
                    if (gndTerm) gndNodeIdx = nodeMap[gndTerm.id];
                }
            });

            if (gndNodeIdx === -1) gndNodeIdx = 0;

            const V = new Array(nodeCount).fill(0.0);
            if (lastVoltages && lastVoltages.length === nodeCount) {
                for (let i = 0; i < nodeCount; i++) V[i] = lastVoltages[i];
            }
            V[gndNodeIdx] = 0.0;

            const iterations = 120;
            for (let iter = 0; iter < iterations; iter++) {
                const nextV = [...V];
                for (let i = 0; i < nodeCount; i++) {
                    if (i === gndNodeIdx) continue;

                    let sumG = 0.0;
                    let sumGV = 0.0;

                    components.forEach(comp => {
                        if (comp.type === 'resistor') {
                            const n1 = nodeMap[comp.terminals[0].id];
                            const n2 = nodeMap[comp.terminals[1].id];
                            if (n1 === i || n2 === i) {
                                const neighbor = (n1 === i) ? n2 : n1;
                                const R = comp.state.resistance || 330;
                                const G = 1 / R;
                                sumG += G;
                                sumGV += G * V[neighbor];
                            }
                        }
                        else if (comp.type === 'usb_power') {
                            const nVbus = nodeMap[comp.terminals.find(t => t.label === '5V').id];
                            const nGnd = nodeMap[comp.terminals.find(t => t.label === 'GND').id];
                            if (nVbus === i || nGnd === i) {
                                const R_src = 0.2;
                                const G = 1 / R_src;
                                if (nVbus === i) {
                                    sumG += G;
                                    sumGV += G * (V[nGnd] + 5.0);
                                } else {
                                    sumG += G;
                                    sumGV += G * (V[nVbus] - 5.0);
                                }
                            }
                        }
                        else if (comp.type === 'solar_panel') {
                            const nPos = nodeMap[comp.terminals.find(t => t.label === '+').id];
                            const nNeg = nodeMap[comp.terminals.find(t => t.label === '-').id];
                            if (nPos === i || nNeg === i) {
                                const R_src = 50.0; // Simulated solar panel load resistance
                                const G = 1 / R_src;
                                const solV = comp.state.voltage;
                                if (nPos === i) {
                                    sumG += G;
                                    sumGV += G * (V[nNeg] + solV);
                                } else {
                                    sumG += G;
                                    sumGV += G * (V[nPos] - solV);
                                }
                            }
                        }
                        else if (comp.type === 'signal_generator') {
                            const nPos = nodeMap[comp.terminals.find(t => t.label === '+').id];
                            const nNeg = nodeMap[comp.terminals.find(t => t.label === '-').id];
                            if (nPos === i || nNeg === i) {
                                const R_src = 10.0;
                                const G = 1 / R_src;
                                const genV = comp.state.amplitude * Math.sin(2 * Math.PI * comp.state.frequency * simulationTime);
                                comp.state.outputVoltage = genV;
                                if (nPos === i) {
                                    sumG += G;
                                    sumGV += G * (V[nNeg] + genV);
                                } else {
                                    sumG += G;
                                    sumGV += G * (V[nPos] - genV);
                                }
                            }
                        }
                        else if (comp.type === 'capacitor') {
                            const nPos = nodeMap[comp.terminals.find(t => t.label === '+').id];
                            const nNeg = nodeMap[comp.terminals.find(t => t.label === '-').id];
                            if (nPos === i || nNeg === i) {
                                // Dynamic companion model: G = C / dt. C = 1000uF = 0.001F. dt = 0.1s. G = 0.001 / 0.1 = 0.01 (R = 100 ohms)
                                const C = 0.001; 
                                const dt = 0.1;
                                const R_eq = dt / C;
                                const G = 1 / R_eq;
                                const capV = comp.state.storedVoltage;

                                if (nPos === i) {
                                    sumG += G;
                                    sumGV += G * (V[nNeg] + capV);
                                } else {
                                    sumG += G;
                                    sumGV += G * (V[nPos] - capV);
                                }
                            }
                        }
                        else if (comp.type === 'diy_cell') {
                            const nAnode = nodeMap[comp.terminals.find(t => t.label === '+').id];
                            const nCathode = nodeMap[comp.terminals.find(t => t.label === '-').id];
                            if (nAnode === i || nCathode === i) {
                                const formingRatio = comp.state.forming / 100;
                                const chargeRatio = comp.state.charge / 100;
                                const cellV = formingRatio * (1.5 + 0.5 * chargeRatio);
                                const R_int = 150 - 146 * formingRatio;
                                const G = 1 / R_int;

                                if (nAnode === i) {
                                    sumG += G;
                                    sumGV += G * (V[nCathode] + cellV);
                                } else {
                                    sumG += G;
                                    sumGV += G * (V[nAnode] - cellV);
                                }
                            }
                        }
                        else if (comp.type === 'led') {
                            if (comp.state.blown) return;
                            const nAnode = nodeMap[comp.terminals.find(t => t.label === '+').id];
                            const nCathode = nodeMap[comp.terminals.find(t => t.label === '-').id];
                            if (nAnode === i || nCathode === i) {
                                const Vf = 2.0;
                                const vDiff = V[nAnode] - V[nCathode];
                                let G = 1 / 1e6;
                                let V_eff = (nAnode === i) ? V[nCathode] : V[nAnode];

                                if (vDiff > Vf) {
                                    G = 1 / 20;
                                    if (nAnode === i) V_eff = V[nCathode] + Vf;
                                    else V_eff = V[nAnode] - Vf;
                                }
                                sumG += G;
                                sumGV += G * V_eff;
                            }
                        }
                        else if (comp.type === 'multimeter') {
                            const nRed = nodeMap[comp.terminals.find(t => t.label === 'VΩ+').id];
                            const nBlack = nodeMap[comp.terminals.find(t => t.label === 'COM-').id];
                            if (nRed === i || nBlack === i) {
                                const neighbor = (nRed === i) ? nBlack : nRed;
                                const R = (comp.state.mode === 'voltage') ? 1e7 : 0.1;
                                const G = 1 / R;
                                sumG += G;
                                sumGV += G * V[neighbor];
                            }
                        }
                        else if (comp.type === 'spst_switch') {
                            const n1 = nodeMap[comp.terminals[0].id];
                            const n2 = nodeMap[comp.terminals[1].id];
                            if (n1 === i || n2 === i) {
                                const neighbor = (n1 === i) ? n2 : n1;
                                const R = comp.state.closed ? 0.01 : 1e7;
                                const G = 1 / R;
                                sumG += G;
                                sumGV += G * V[neighbor];
                            }
                        }
                        else if (comp.type === 'npn_transistor') {
                            const nC = nodeMap[comp.terminals.find(t => t.label === 'C').id];
                            const nB = nodeMap[comp.terminals.find(t => t.label === 'B').id];
                            const nE = nodeMap[comp.terminals.find(t => t.label === 'E').id];
                            
                            // Base-Emitter Diode Model
                            if (nB === i || nE === i) {
                                const neighbor = (nB === i) ? nE : nB;
                                const vDiff = V[nB] - V[nE];
                                const active = vDiff > 0.7;
                                const G = active ? (1 / 50.0) : (1 / 1e6);
                                const V_eff = (nB === i) ? (V[nE] + 0.7) : (V[nB] - 0.7);
                                sumG += G;
                                sumGV += G * (active ? V_eff : V[neighbor]);
                            }

                            // Collector-Emitter Controlled Channel
                            if (nC === i || nE === i) {
                                const neighbor = (nC === i) ? nE : nC;
                                const vDiffBE = V[nB] - V[nE];
                                const Ib = Math.max(0, (vDiffBE - 0.7) / 50.0);
                                comp.state.current_b = Ib;
                                const beta = comp.state.beta || 100;
                                const R_ce = Math.max(2.0, 1 / (beta * Ib + 1e-6));
                                const G = 1 / R_ce;
                                sumG += G;
                                sumGV += G * V[neighbor];
                            }
                        }
                        else if (comp.type === 'pnp_transistor') {
                            const nC = nodeMap[comp.terminals.find(t => t.label === 'C').id];
                            const nB = nodeMap[comp.terminals.find(t => t.label === 'B').id];
                            const nE = nodeMap[comp.terminals.find(t => t.label === 'E').id];
                            
                            // Emitter-Base Diode model (Active when Ve - Vb > 0.7)
                            if (nB === i || nE === i) {
                                const neighbor = (nE === i) ? nB : nE;
                                const vDiff = V[nE] - V[nB];
                                const active = vDiff > 0.7;
                                const G = active ? (1 / 50.0) : (1 / 1e6);
                                const V_eff = (nE === i) ? (V[nB] + 0.7) : (V[nE] - 0.7);
                                sumG += G;
                                sumGV += G * (active ? V_eff : V[neighbor]);
                            }

                            // Emitter-Collector regulated channel
                            if (nC === i || nE === i) {
                                const neighbor = (nE === i) ? nC : nE;
                                const vDiffEB = V[nE] - V[nB];
                                const Ib = Math.max(0, (vDiffEB - 0.7) / 50.0);
                                comp.state.current_b = Ib;
                                const beta = comp.state.beta || 100;
                                const R_ec = Math.max(2.0, 1 / (beta * Ib + 1e-6));
                                const G = 1 / R_ec;
                                sumG += G;
                                sumGV += G * V[neighbor];
                            }
                        }
                        else if (comp.type === 'mosfet_n') {
                            const nD = nodeMap[comp.terminals.find(t => t.label === 'D').id];
                            const nG = nodeMap[comp.terminals.find(t => t.label === 'G').id];
                            const nS = nodeMap[comp.terminals.find(t => t.label === 'S').id];

                            // Gate isolation impedance
                            if (nG === i) {
                                sumG += 1 / 1e9;
                                sumGV += (1 / 1e9) * V[nS];
                            }

                            // Drain-Source conductive state
                            if (nD === i || nS === i) {
                                const neighbor = (nD === i) ? nS : nD;
                                const vgs = V[nG] - V[nS];
                                const active = vgs > 2.0;
                                const R_ds = active ? 0.5 : 1e6;
                                const G = 1 / R_ds;
                                sumG += G;
                                sumGV += G * V[neighbor];
                            }
                        }
                    });

                    if (sumG > 0) {
                        nextV[i] = sumGV / sumG;
                    } else {
                        nextV[i] = 0;
                    }
                }
                V.forEach((val, idx) => {
                    if (idx !== gndNodeIdx) V[idx] = nextV[idx];
                });
            }

            lastVoltages = V;

            // Update physical parameters
            components.forEach(comp => {
                comp.terminals.forEach(term => {
                    term.voltage = V[nodeMap[term.id]] || 0.0;
                });

                if (comp.type === 'signal_generator') {
                    const disp = document.getElementById(`${comp.id}-out`);
                    if (disp) disp.innerText = comp.state.outputVoltage.toFixed(2) + ' V';
                }
                else if (comp.type === 'capacitor') {
                    const vPos = comp.terminals.find(t => t.label === '+').voltage;
                    const vNeg = comp.terminals.find(t => t.label === '-').voltage;
                    const dt = 0.1;
                    const C = 0.001; 
                    const R_eq = dt / C;
                    
                    // Trapezoidal differential state updates
                    const current = (vPos - vNeg - comp.state.storedVoltage) / R_eq;
                    comp.state.storedVoltage += (current * dt) / C;
                    
                    // Clamp bounds
                    if (comp.state.storedVoltage < -15) comp.state.storedVoltage = -15;
                    if (comp.state.storedVoltage > 15) comp.state.storedVoltage = 15;

                    const emfDisp = document.getElementById(`${comp.id}-stored-emf`);
                    const bar = document.getElementById(`${comp.id}-charge-bar`);
                    if (emfDisp) emfDisp.innerText = comp.state.storedVoltage.toFixed(2) + ' V';
                    if (bar) {
                        const pct = Math.max(0, Math.min(100, (comp.state.storedVoltage / 12.0) * 100));
                        bar.style.width = pct + '%';
                    }
                }
                else if (comp.type === 'diy_cell') {
                    const vAnode = comp.terminals.find(t => t.label === '+').voltage;
                    const vCathode = comp.terminals.find(t => t.label === '-').voltage;
                    const formingRatio = comp.state.forming / 100;
                    const chargeRatio = comp.state.charge / 100;
                    const cellV = formingRatio * (1.5 + 0.5 * chargeRatio);
                    const R_int = 150 - 146 * formingRatio;

                    const current = (vAnode - vCathode - cellV) / R_int;
