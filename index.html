<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- PWA & iOS Fullscreen Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta name="description" content="Digital Clock & Device Dashboard">
    <title>Digital Dashboard</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon-192x192.png">
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #00ff41;
            --dark-bg: #000000;
            --dim-green: #004d14;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            color: var(--neon-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Canvas Animation Layer */
        #waveCanvas {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        #waveCanvas.charging {
            opacity: 1;
        }

        /* Main Clock UI */
        .clock-container {
            z-index: 2;
            text-align: center;
            text-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
            /* Push clock slightly up to balance the footer */
            transform: translateY(-5vh); 
        }

        .time {
            font-size: 18vw;
            line-height: 1;
            letter-spacing: 2px;
        }

        .date {
            font-size: 3.5vw;
            margin-top: 10px;
            letter-spacing: 1px;
            opacity: 0.8;
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* Footer Stats UI */
        .footer-stats {
            position: absolute;
            /* safe-area-inset ensures it avoids the iOS bottom home swipe bar */
            bottom: max(20px, env(safe-area-inset-bottom));
            z-index: 3;
            width: 90%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border-top: 1px solid var(--dim-green);
            padding-top: 15px;
            text-shadow: 0 0 5px var(--neon-green);
            cursor: pointer; /* Suggests interactivity for the iOS workaround */
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            width: 33%;
        }

        .stat-label {
            font-size: 10px;
            opacity: 0.7;
            text-transform: uppercase;
        }

        /* Battery Bar Layout */
        .battery-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .battery-outline {
            width: 40px;
            height: 18px;
            border: 2px solid var(--neon-green);
            border-radius: 3px;
            position: relative;
            padding: 1px;
        }

        .battery-outline::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 4px;
            width: 3px;
            height: 6px;
            background-color: var(--neon-green);
            border-radius: 0 2px 2px 0;
        }

        .battery-fill {
            height: 100%;
            background-color: var(--neon-green);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 5px var(--neon-green);
        }

        /* Responsive adjustments */
        @media (min-width: 768px) {
            .time { font-size: 120px; }
            .date { font-size: 24px; }
            .footer-stats { font-size: 16px; bottom: max(40px, env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body>

    <!-- Energy Flow Animation Canvas -->
    <canvas id="waveCanvas"></canvas>

    <!-- Center Clock -->
    <main class="clock-container">
        <div class="time" id="timeDisplay">00:00:00</div>
        <div class="date" id="dateDisplay">Loading...</div>
    </main>

    <!-- Bottom Dashboard -->
    <footer class="footer-stats" id="footerClickArea">
        <div class="stat-group">
            <span class="stat-label">CPU Cores</span>
            <span id="cpuDisplay">--</span>
        </div>
        <div class="stat-group">
            <span class="stat-label">RAM</span>
            <span id="ramDisplay">--</span>
        </div>
        <div class="stat-group">
            <span class="stat-label" id="chargeStatus">Battery</span>
            <div class="battery-container">
                <div class="battery-outline">
                    <div class="battery-fill" id="batteryFill"></div>
                </div>
                <span id="batteryPct">--%</span>
            </div>
        </div>
    </footer>

    <script>
        'use strict';

        /** 
         * Service Worker Registration for PWA 
         * @returns {void}
         */
        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('sw.js').catch(error => {
                        console.error('SW Registration failed:', error);
                    });
                });
            }
        }

        /**
         * Get Ordinal Suffix for Day (st, nd, rd, th)
         * @param {number} d - Day of the month
         * @returns {string} 
         */
        function getOrdinalSuffix(d) {
            if (d > 3 && d < 21) return 'th';
            switch (d % 10) {
                case 1:  return "st";
                case 2:  return "nd";
                case 3:  return "rd";
                default: return "th";
            }
        }

        /**
         * Update Clock and Date UI
         * @returns {void}
         */
        function updateClock() {
            const now = new Date();
            
            // Time Formatting (12-hr HH:MM:SS)
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            hours = hours % 12;
            hours = hours ? hours : 12; // '0' becomes '12'
            const hoursStr = String(hours).padStart(2, '0');
            
            document.getElementById('timeDisplay').textContent = `${hoursStr}:${minutes}:${seconds}`;

            // Date Formatting
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            
            const dayName = days[now.getDay()];
            const monthName = months[now.getMonth()];
            const dayNum = now.getDate();
            const year = now.getFullYear();
            const suffix = getOrdinalSuffix(dayNum);

            document.getElementById('dateDisplay').textContent = `${dayName}, ${monthName} ${dayNum}${suffix}, ${year}`;
        }

        /** 
         * Canvas Energy Flow Animation System 
         */
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let isCharging = false;
        let animationFrameId;
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class LightParticle {
            constructor() {
                this.reset();
                this.y = canvas.height + Math.random() * 200; 
            }

            reset() {
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 60; 
                this.y = canvas.height + 10;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 3 + 1.5;
                this.speedX = (Math.random() - 0.5) * 2.0;
                this.life = 1.0;
                this.decay = Math.random() * 0.005 + 0.002;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.speedX += (Math.random() - 0.5) * 0.1;
                this.life -= this.decay;

                if (this.life <= 0 || this.y < 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 255, 65, ${this.life})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00ff41';
                ctx.fill();
                ctx.shadowBlur = 0; 
            }
        }

        function initParticles() {
            particles = [];
            const particleCount = window.innerWidth < 768 ? 60 : 120;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new LightParticle());
            }
        }

        function animateWaves() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isCharging) {
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
            }
            animationFrameId = requestAnimationFrame(animateWaves);
        }

        /**
         * Initialize Hardware and Battery Stats
         * @returns {void}
         */
        function initStats() {
            const cpuDisplay = document.getElementById('cpuDisplay');
            const ramDisplay = document.getElementById('ramDisplay');
            const batteryFill = document.getElementById('batteryFill');
            const batteryPct = document.getElementById('batteryPct');
            const chargeStatus = document.getElementById('chargeStatus');
            const footerClickArea = document.getElementById('footerClickArea');
            
            // iOS restricts RAM/CPU. If unavailable, show "SECURE" instead of ugly N/A
            cpuDisplay.textContent = navigator.hardwareConcurrency ? navigator.hardwareConcurrency : 'SECURE';
            ramDisplay.textContent = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'SECURE';

            function updateBatteryUI(battery) {
                const level = Math.round(battery.level * 100);
                batteryFill.style.width = `${level}%`;
                batteryPct.textContent = `${level}%`;
                
                isCharging = battery.charging;
                
                if (isCharging) {
                    chargeStatus.textContent = 'CHARGING';
                    canvas.classList.add('charging');
                } else {
                    chargeStatus.textContent = 'BATTERY';
                    canvas.classList.remove('charging');
                }
            }

            // Detect if browser supports Battery API (Android/Chrome)
            if ('getBattery' in navigator) {
                navigator.getBattery().then(battery => {
                    updateBatteryUI(battery);
                    battery.addEventListener('levelchange', () => updateBatteryUI(battery));
                    battery.addEventListener('chargingchange', () => updateBatteryUI(battery));
                });
            } else {
                // iOS FALLBACK: Apple blocks getBattery() 
                // We provide a manual tap-to-toggle feature so iOS users can still see the animation
                batteryFill.style.width = '100%';
                batteryPct.textContent = 'SECURE';
                chargeStatus.textContent = 'TAP TO CHG';
                
                footerClickArea.addEventListener('click', () => {
                    isCharging = !isCharging;
                    if (isCharging) {
                        chargeStatus.textContent = 'CHARGING';
                        canvas.classList.add('charging');
                    } else {
                        chargeStatus.textContent = 'TAP TO CHG';
                        canvas.classList.remove('charging');
                    }
                });
            }

            // Attempt to force fullscreen on interaction (helps hide UI on Android/Desktop)
            document.body.addEventListener('dblclick', () => {
                if (!document.fullscreenElement && document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            });
        }

        // Initialization
        window.addEventListener('resize', resizeCanvas);
        setInterval(updateClock, 100);
        
        registerServiceWorker();
        updateClock();
        initStats();
        
        resizeCanvas();
        initParticles();
        animateWaves();

    </script>
</body>
</html>
