<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Axiom Engine | Hip Hop Discography Ledger</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        :root {
            --bg-color: #0f0f0f;
            --surface-color: #212121;
            --hover-color: #3d3d3d;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --accent-color: #3ea6ff;
            --verified-color: #2ba640;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
            position: fixed;
            width: 100%;
        }
        
        .status-bar-bg {
            display: block; width: 100%; position: sticky; top: 0;
            height: calc(env(safe-area-inset-top) + 30px);
            background-color: #000000; z-index: 100; 
        }

        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: sticky; top: calc(env(safe-area-inset-top) + 30px);
            height: 60px; background-color: var(--bg-color); z-index: 90;
            border-bottom: 1px solid #1f1f1f;
        }

        .logo { font-size: 20px; font-weight: 700; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon { width: 30px; height: 30px; background: linear-gradient(45deg, #8a2387, #e94057, #f27121); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }

        .search-bar { display: flex; flex: 0 1 600px; background-color: #121212; border: 1px solid #303030; border-radius: 40px; overflow: hidden; margin: 0 20px; }
        .search-bar input { flex: 1; background: transparent; border: none; color: var(--text-primary); padding: 10px 20px; font-size: 16px; outline: none; }
        .search-bar button { background-color: #222222; border: none; border-left: 1px solid #303030; padding: 0 20px; color: var(--text-primary); cursor: pointer; }

        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; margin-top: 0; }

        .sidebar { width: 240px; background-color: var(--bg-color); padding: 12px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
        .sidebar-item { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; display: flex; align-items: center; gap: 15px; }
        .sidebar-item:hover, .sidebar-item.active { background-color: var(--surface-color); }

        .content { flex: 1; overflow-y: auto; background-color: var(--bg-color); padding: 20px; padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

        /* --- HOME GRID VIEW --- */
        .filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .filter-chip { background-color: var(--surface-color); color: var(--text-primary); border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .filter-chip.active { background-color: var(--text-primary); color: var(--bg-color); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 1/1; border-radius: 8px; position: relative; background-color: #222; background-size: cover; background-position: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .thumbnail:hover { transform: scale(1.02); }
        .source-badge { position: absolute; bottom: 8px; right: 8px; background-color: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; z-index: 2; }
        
        .card-info { display: flex; gap: 12px; }
        .channel-icon { width: 36px; height: 36px; border-radius: 50%; background-color: var(--surface-color); display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; background-size: cover; background-position: center; }
        .meta { display: flex; flex-direction: column; }
        .fact-title { font-size: 16px; font-weight: 500; line-height: 1.4; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .fact-details { font-size: 14px; color: var(--text-secondary); }

        /* --- PLAYLIST WATCH VIEW --- */
        .watch-container { display: none; flex-direction: row; gap: 24px; width: 100%; max-width: 1600px; margin: 0 auto; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .watch-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 15px; }
        .watch-sidebar { width: 400px; display: flex; flex-direction: column; gap: 15px; }

        .watch-player { width: 100%; height: 350px; border-radius: 12px; background-color: #000; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .watch-player::after { content: ''; position: absolute; inset: 0; backdrop-filter: blur(20px); background: rgba(0,0,0,0.5); z-index: 1; }
        .watch-player-art { height: 90%; aspect-ratio: 1/1; background-size: cover; background-position: center; z-index: 2; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .watch-title { font-size: 24px; font-weight: 700; line-height: 1.4; }
        
        .watch-channel-row { display: flex; justify-content: space-between; align-items: center; }
        .watch-channel-info { display: flex; align-items: center; gap: 15px; }
        .watch-channel-name { font-weight: bold; font-size: 18px; }
        .watch-channel-sub { font-size: 14px; color: var(--text-secondary); }
        
        .watch-btn { background-color: var(--surface-color); color: var(--text-primary); border: none; padding: 10px 20px; border-radius: 20px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .watch-btn:hover { background-color: var(--hover-color); }

        .watch-description { background-color: var(--surface-color); border-radius: 12px; padding: 20px; font-size: 14px; line-height: 1.6; color: var(--text-primary); }
        
        .tracklist { margin-top: 15px; display: flex; flex-direction: column; }
        .track-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .track-item:last-child { border-bottom: none; }
        .track-item:hover { background-color: rgba(255,255,255,0.05); border-radius: 6px; }
        .track-num { width: 30px; color: var(--text-secondary); font-weight: bold; }
        .track-name { flex: 1; font-size: 15px; }

        .crypto-box { background-color: #121212; border-left: 3px solid var(--verified-color); padding: 15px; border-radius: 0 8px 8px 0; margin-top: 25px; font-family: monospace; font-size: 12px; word-break: break-all; }

        @media (max-width: 1000px) {
            .watch-container { flex-direction: column; }
            .watch-sidebar { width: 100%; }
        }
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .search-bar { margin: 0 10px; flex: 1; }
            .logo-text-hide { display: none; }
            .watch-channel-row { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="status-bar-bg"></div>

    <header>
        <div class="logo" onclick="closeWatchView()">
            <div class="logo-icon">♬</div>
            <span class="logo-text-hide">LedgerAmp</span>
        </div>
        
        <form class="search-bar" action="javascript:void(0);" onsubmit="applyFilters(); return false;">
            <input type="search" id="searchInput" placeholder="Search artists, albums, or tracks..." enterkeyhint="search">
            <button type="submit">🔍</button>
        </form>

        <div class="logo logo-text-hide" style="font-size:12px; color:var(--text-secondary)">
            Ledger: <span id="syncStatus" style="color:var(--verified-color)">● Synced</span>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar" id="mainSidebar">
            <div class="sidebar-item active" onclick="setCategory('All')">🏠 All Releases</div>
            <div class="sidebar-item" onclick="setCategory('Eminem')">🎤 Eminem</div>
            <div class="sidebar-item" onclick="setCategory('Kendrick Lamar')">👑 Kendrick Lamar</div>
            <div class="sidebar-item" onclick="setCategory('2Pac')">🕊️ 2Pac</div>
            <div class="sidebar-item" onclick="setCategory('Jay-Z')">🗽 Jay-Z</div>
            <div style="border-top: 1px solid var(--surface-color); margin: 10px 0;"></div>
            <div class="sidebar-item" onclick="setCategory('Favorites')">⭐ Saved Albums</div>
        </aside>

        <main class="content" id="mainContent">
            
            <div id="gridContainer">
                <div class="filters" id="filterContainer">
                    <button class="filter-chip active" onclick="setCategory('All')">All</button>
                    <button class="filter-chip" onclick="setCategory('Eminem')">Eminem</button>
                    <button class="filter-chip" onclick="setCategory('Dr. Dre')">Dr. Dre</button>
                    <button class="filter-chip" onclick="setCategory('Kendrick Lamar')">Kendrick</button>
                    <button class="filter-chip" onclick="setCategory('J. Cole')">J. Cole</button>
                    <button class="filter-chip" onclick="setCategory('Drake')">Drake</button>
                </div>
                <div class="grid" id="videoGrid"></div>
            </div>

            <div id="watchContainer" class="watch-container">
                <div class="watch-main">
                    <div class="watch-player" id="wPlayer">
                        <div class="watch-player-art" id="wPlayerArt"></div>
                    </div>
                    <div class="watch-title" id="wTitle">Album Title</div>
                    
                    <div class="watch-channel-row">
                        <div class="watch-channel-info">
                            <div class="channel-icon" id="wChannelIcon" style="width:48px; height:48px;"></div>
                            <div>
                                <div class="watch-channel-name" id="wChannelName">Artist Name</div>
                                <div class="watch-channel-sub" id="wReleaseDate">Release Date • <span style="color:var(--verified-color)">✔ Verified</span></div>
                            </div>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="watch-btn" id="wFavBtn">☆ Save</button>
                        </div>
                    </div>

                    <div class="watch-description">
                        <h3 style="margin-bottom: 10px; color: var(--accent-color);">Official Tracklist</h3>
                        <div class="tracklist" id="wTracklist">
                            <!-- Tracks injected here -->
                        </div>

                        <div class="crypto-box">
                            <strong style="color:var(--text-secondary)">Immutable Block Hash:</strong><br>
                            <span id="wHash" style="color:var(--verified-color)">hash</span><br><br>
                            <strong style="color:var(--text-secondary)">Previous Hash:</strong><br>
                            <span id="wPrevHash">prev</span>
                        </div>
                    </div>
                </div>

                <div class="watch-sidebar" id="wSidebar">
                    <!-- Related thumbs injected here -->
                </div>
            </div>

        </main>
    </div>

    <script>
        let fullLedger = [];
        let currentCategory = 'All';
        let favorites = JSON.parse(localStorage.getItem('axiom_favs')) || [];

        function hashToGradient(hash) {
            const c1 = `#${hash.substring(0, 6)}`;
            const c2 = `#${hash.substring(6, 12)}`;
            return `linear-gradient(135deg, ${c1}, ${c2})`;
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateString).toLocaleDateString(undefined, options);
        }

        function toggleFav(hash, event) {
            if(event) event.stopPropagation();
            if (favorites.includes(hash)) {
                favorites = favorites.filter(h => h !== hash);
            } else {
                favorites.push(hash);
            }
            localStorage.setItem('axiom_favs', JSON.stringify(favorites));
            
            if(document.getElementById('watchContainer').style.display === 'flex') {
                const btn = document.getElementById('wFavBtn');
                btn.innerHTML = favorites.includes(hash) ? '⭐ Saved' : '☆ Save';
            } else {
                applyFilters();
            }
        }

        function openWatchView(hash) {
            const block = fullLedger.find(b => b.hash === hash);
            if(!block) return;

            document.getElementById('gridContainer').style.display = 'none';
            const watchContainer = document.getElementById('watchContainer');
            watchContainer.style.display = 'flex';
            document.getElementById('mainContent').scrollTop = 0;

            const bgUrl = block.image_url || '';
            const player = document.getElementById('wPlayer');
            player.style.backgroundImage = `url('${bgUrl}')`;
            
            const art = document.getElementById('wPlayerArt');
            art.style.backgroundImage = `url('${bgUrl}')`;
            
            document.getElementById('wTitle').innerText = block.album;
            
            const cIcon = document.getElementById('wChannelIcon');
            cIcon.style.backgroundImage = `url('${bgUrl}')`;
            
            document.getElementById('wChannelName').innerText = block.artist;
            document.getElementById('wReleaseDate').innerText = `Released: ${formatDate(block.release_date)}`;
            
            // Build Tracklist
            const tContainer = document.getElementById('wTracklist');
            tContainer.innerHTML = '';
            if (block.tracks && block.tracks.length > 0) {
                block.tracks.forEach((track, index) => {
                    const el = document.createElement('div');
                    el.className = 'track-item';
                    el.innerHTML = `
                        <span class="track-num">${index + 1}</span>
                        <span class="track-name">${track}</span>
                    `;
                    tContainer.appendChild(el);
                });
            } else {
                tContainer.innerHTML = '<p style="color:var(--text-secondary)">Tracklist data unavailable.</p>';
            }

            // Crypto Info
            document.getElementById('wHash').innerText = block.hash;
            document.getElementById('wPrevHash').innerText = block.prev_hash;
            
            const favBtn = document.getElementById('wFavBtn');
            favBtn.innerHTML = favorites.includes(block.hash) ? '⭐ Saved' : '☆ Save';
            favBtn.onclick = () => toggleFav(block.hash);

            populateWatchSidebar(block);
        }

        function populateWatchSidebar(currentBlock) {
            const sidebar = document.getElementById('wSidebar');
            sidebar.innerHTML = '<h3 style="font-size:16px; margin-bottom:10px;">More from this Artist</h3>';
            
            let related = fullLedger.filter(b => b.artist === currentBlock.artist && b.hash !== currentBlock.hash);
            if(related.length < 3) {
                const others = fullLedger.filter(b => b.hash !== currentBlock.hash);
                related = related.concat(others);
            }
            related = related.slice(0, 8);

            related.forEach(block => {
                const bgStyle = `background-image: url('${block.image_url}');`;
                const el = document.createElement('div');
                el.style.display = 'flex';
                el.style.gap = '10px';
                el.style.cursor = 'pointer';
                el.onclick = () => openWatchView(block.hash);

                el.innerHTML = `
                    <div style="width:120px; height:120px; border-radius:8px; flex-shrink:0; background-size:cover; background-position:center; ${bgStyle}"></div>
                    <div style="display:flex; flex-direction:column; justify-content:center; overflow:hidden;">
                        <span style="font-size:14px; font-weight:bold; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.3; margin-bottom:4px;">${block.album}</span>
                        <span style="font-size:12px; color:var(--text-secondary);">${block.artist}</span>
                        <span style="font-size:12px; color:var(--text-secondary); margin-top:4px;">${new Date(block.release_date).getFullYear()}</span>
                    </div>
                `;
                sidebar.appendChild(el);
            });
        }

        function closeWatchView() {
            document.getElementById('watchContainer').style.display = 'none';
            document.getElementById('gridContainer').style.display = 'block';
            applyFilters(); 
        }

        function renderGrid(data) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            if (data.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-secondary); grid-column: 1/-1;">No records found in the ledger.</p>';
                return;
            }

            data.forEach(block => {
                const bgStyle = `background-image: url('${block.image_url}');`;
                const year = new Date(block.release_date).getFullYear();

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openWatchView(block.hash);
                
                card.innerHTML = `
                    <div class="thumbnail" style="${bgStyle}">
                        <div class="source-badge">${block.tracks ? block.tracks.length : 0} Tracks</div>
                    </div>
                    <div class="card-info">
                        <div class="channel-icon" style="background-image: url('${block.image_url}')"></div>
                        <div class="meta">
                            <div class="fact-title" title="${block.album}">${block.album}</div>
                            <div class="fact-details">
                                ${block.artist} <span class="verified-icon">✔</span><br>
                                ${year}
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function applyFilters() {
            const input = document.getElementById('searchInput');
            const query = input.value.toLowerCase();
            input.blur();

            let filtered = fullLedger;

            if (currentCategory === 'Favorites') {
                filtered = filtered.filter(b => favorites.includes(b.hash));
            } else if (currentCategory !== 'All') {
                filtered = filtered.filter(b => b.artist === currentCategory);
            }

            if (query) {
                filtered = filtered.filter(b => 
                    b.album.toLowerCase().includes(query) || 
                    b.artist.toLowerCase().includes(query) ||
                    (b.tracks && b.tracks.some(t => t.toLowerCase().includes(query)))
                );
                closeWatchView(); 
            }

            renderGrid(filtered);
        }

        function setCategory(category) {
            currentCategory = category;
            
            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(category) || (category === 'All' && el.innerText.includes('All Releases'))) {
                    el.classList.add('active');
                }
            });

            document.querySelectorAll('.filter-chip').forEach(el => {
                el.classList.remove('active');
                if(el.innerText === category || (category === 'All' && el.innerText === 'All')) {
                    el.classList.add('active');
                }
            });

            closeWatchView();
        }

        async function init() {
            try {
                const response = await fetch('ledger.json?nocache=' + new Date().getTime());
                if(!response.ok) throw new Error("Ledger not found");
                fullLedger = await response.json();
                applyFilters();
            } catch (err) {
                console.error("Error fetching ledger:", err);
                document.getElementById('syncStatus').innerText = 'Offline';
                document.getElementById('syncStatus').style.color = 'red';
            }
        }

        init();
    </script>
</body>
</html>
