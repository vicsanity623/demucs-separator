<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LedgerAmp | Local Storage Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        :root { --bg-color: #0f0f0f; --surface-color: #212121; --hover-color: #3d3d3d; --text-primary: #f1f1f1; --text-secondary: #aaaaaa; --accent-color: #3ea6ff; --verified-color: #2ba640; --player-height: 80px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: fixed; width: 100%; }
        
        .status-bar-bg { display: block; width: 100%; position: sticky; top: 0; height: calc(env(safe-area-inset-top) + 30px); background-color: #000000; z-index: 100; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: calc(env(safe-area-inset-top) + 30px); height: 60px; background-color: var(--bg-color); z-index: 90; border-bottom: 1px solid #1f1f1f; }
        
        .logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon { width: 30px; height: 30px; background: linear-gradient(45deg, #8a2387, #e94057, #f27121); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        
        .search-bar { display: flex; flex: 0 1 600px; background-color: #121212; border: 1px solid #303030; border-radius: 40px; overflow: hidden; margin: 0 20px; }
        .search-bar input { flex: 1; background: transparent; border: none; color: var(--text-primary); padding: 10px 20px; font-size: 16px; outline: none; }
        .search-bar button { background-color: #222222; border: none; border-left: 1px solid #303030; padding: 0 20px; color: var(--text-primary); cursor: pointer; }

        .main-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 240px; background-color: var(--bg-color); padding: 12px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; z-index: 10;}
        .sidebar-item { padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 15px; }
        .sidebar-item:hover, .sidebar-item.active { background-color: var(--surface-color); }
        
        .content { flex: 1; overflow-y: auto; background-color: var(--bg-color); padding: 20px; padding-bottom: calc(var(--player-height) + 40px + env(safe-area-inset-bottom)); }

        .filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .filter-chip { background-color: var(--surface-color); color: var(--text-primary); border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .filter-chip.active { background-color: var(--text-primary); color: var(--bg-color); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { display: flex; flex-direction: column; gap: 12px; cursor: pointer; }
        .thumbnail { width: 100%; aspect-ratio: 1/1; border-radius: 8px; background-color: #222; background-size: cover; background-position: center; transition: 0.2s; position: relative; }
        .thumbnail:hover { transform: scale(1.02); }
        
        .watch-container { display: none; flex-direction: row; gap: 24px; max-width: 1400px; margin: 0 auto; }
        .watch-main { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .watch-player { width: 100%; height: 350px; border-radius: 12px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .watch-player::after { content: ''; position: absolute; inset: 0; backdrop-filter: blur(20px); background: rgba(0,0,0,0.5); z-index: 1; }
        .watch-player-art { height: 90%; aspect-ratio: 1/1; background-size: cover; background-position: center; z-index: 2; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        
        .tracklist { margin-top: 15px; display: flex; flex-direction: column; }
        .track-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; gap: 15px; }
        .track-item:hover { background-color: rgba(255,255,255,0.05); border-radius: 6px; }
        .track-num { width: 20px; color: var(--text-secondary); font-weight: bold; }
        .track-name { flex: 1; font-size: 15px; }
        
        .action-btn { background: none; border: none; color: var(--text-primary); font-size: 18px; cursor: pointer; padding: 5px; opacity: 0.7; transition: 0.2s; }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }
        .local-badge { font-size: 10px; background-color: var(--verified-color); color: white; padding: 2px 6px; border-radius: 10px; margin-left: 10px; vertical-align: middle;}

        /* --- BOTTOM MEDIA PLAYER --- */
        .bottom-player { position: fixed; bottom: 0; left: 0; width: 100%; height: calc(var(--player-height) + env(safe-area-inset-bottom)); background-color: #181818; border-top: 1px solid #333; display: flex; align-items: center; padding: 0 20px; padding-bottom: env(safe-area-inset-bottom); z-index: 200; gap: 20px; transform: translateY(100%); transition: transform 0.3s ease; }
        .bottom-player.active { transform: translateY(0); }
        .player-art { width: 50px; height: 50px; border-radius: 4px; background-size: cover; background-color: #333; }
        .player-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
        .player-title { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 12px; color: var(--text-secondary); }
        .player-controls { display: flex; align-items: center; gap: 20px; }
        .play-pause-btn { width: 40px; height: 40px; border-radius: 50%; background-color: var(--text-primary); color: var(--bg-color); border: none; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .watch-container { flex-direction: column; }
            .bottom-player { padding: 0 10px; padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body>
    <div class="status-bar-bg"></div>

    <header>
        <div class="logo" onclick="closeWatchView()">
            <div class="logo-icon">♬</div>
            <span class="logo-text-hide">LedgerAmp</span>
        </div>
        <form class="search-bar" action="javascript:void(0);" onsubmit="applyFilters(); return false;">
            <input type="search" id="searchInput" placeholder="Search artists, albums..." enterkeyhint="search">
            <button type="submit">🔍</button>
        </form>
    </header>

    <!-- Hidden File Input for MP3 Uploads -->
    <input type="file" id="audioUploader" accept="audio/*" style="display:none;">

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-item active" onclick="setCategory('All')">🏠 Home</div>
            <div style="border-top: 1px solid var(--surface-color); margin: 10px 0;"></div>
            <div class="sidebar-item" onclick="setCategory('Eminem')">🎤 Eminem</div>
            <div class="sidebar-item" onclick="setCategory('Kendrick Lamar')">👑 Kendrick Lamar</div>
            <div class="sidebar-item" onclick="setCategory('2Pac')">🕊️ 2Pac</div>
            <div class="sidebar-item" onclick="setCategory('Jay-Z')">🗽 Jay-Z</div>
            <div class="sidebar-item" onclick="setCategory('Dr. Dre')">🎧 Dr. Dre</div>
        </aside>

        <main class="content" id="mainContent">
            
            <div id="gridContainer">
                <div class="filters" id="filterContainer">
                    <button class="filter-chip active" onclick="setCategory('All')">All</button>
                    <button class="filter-chip" onclick="setCategory('Eminem')">Eminem</button>
                    <button class="filter-chip" onclick="setCategory('Kendrick Lamar')">Kendrick</button>
                </div>
                <div class="grid" id="videoGrid"></div>
            </div>

            <div id="watchContainer" class="watch-container">
                <div class="watch-main">
                    <div class="watch-player" id="wPlayer">
                        <div class="watch-player-art" id="wPlayerArt"></div>
                    </div>
                    <div style="font-size: 24px; font-weight: bold;" id="wTitle">Album Title</div>
                    <div style="color:var(--text-secondary)" id="wChannelName">Artist Name</div>
                    
                    <div class="tracklist" id="wTracklist">
                        <!-- Tracks Injected Here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- GLOBAL AUDIO PLAYER -->
    <div class="bottom-player" id="globalPlayerUI">
        <div class="player-art" id="pArt"></div>
        <div class="player-info">
            <span class="player-title" id="pTitle">Select a track</span>
            <span class="player-artist" id="pArtist">---</span>
        </div>
        <div class="player-controls">
            <button class="play-pause-btn" id="pPlayBtn" onclick="togglePlayPause()">▶</button>
        </div>
        <audio id="audioElement"></audio>
    </div>

    <script>
        let fullLedger = [];
        let currentCategory = 'All';

        // --- INDEXED DB SETUP FOR LOCAL MP3 STORAGE ---
        let db;
        let ownedTracks = new Set(); // Keep track of keys we have saved
        let currentUploadKey = null; // Track which song the user is currently uploading

        const request = indexedDB.open("LedgerAmpDB", 1);
        
        request.onupgradeneeded = function(event) {
            db = event.target.result;
            db.createObjectStore("audioFiles", { keyPath: "trackKey" });
        };

        request.onsuccess = function(event) {
            db = event.target.result;
            loadOwnedTracks();
        };

        function loadOwnedTracks() {
            const transaction = db.transaction(["audioFiles"], "readonly");
            const objectStore = transaction.objectStore("audioFiles");
            const req = objectStore.getAllKeys();
            req.onsuccess = function() {
                ownedTracks = new Set(req.result);
            };
        }

        function saveLocalAudio(trackKey, fileBlob) {
            const transaction = db.transaction(["audioFiles"], "readwrite");
            const objectStore = transaction.objectStore("audioFiles");
            const request = objectStore.put({ trackKey: trackKey, file: fileBlob });
            
            request.onsuccess = function() {
                ownedTracks.add(trackKey);
                alert("File saved locally! This full track will now play instead of the preview.");
                // Re-render tracklist if we are currently looking at it
                if(document.getElementById('watchContainer').style.display === 'flex') {
                    const currentHash = document.getElementById('watchContainer').getAttribute('data-hash');
                    openWatchView(currentHash); 
                }
            };
        }

        function getLocalAudio(trackKey, callback) {
            const transaction = db.transaction(["audioFiles"], "readonly");
            const objectStore = transaction.objectStore("audioFiles");
            const request = objectStore.get(trackKey);
            request.onsuccess = function(event) {
                if(request.result) callback(request.result.file);
                else callback(null);
            };
        }

        // Handle the hidden file input change
        document.getElementById('audioUploader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file || !currentUploadKey) return;
            saveLocalAudio(currentUploadKey, file);
            e.target.value = ''; // reset
        });

        function triggerUpload(trackKey) {
            currentUploadKey = trackKey;
            document.getElementById('audioUploader').click();
        }

        // --- AUDIO PLAYER LOGIC ---
        const audio = document.getElementById('audioElement');
        let currentPlayingUrl = "";
        let currentLocalBlobUrl = null;

        function playAudio(trackKey, previewUrl, trackName, artist, coverUrl) {
            document.getElementById('globalPlayerUI').classList.add('active');
            document.getElementById('pArt').style.backgroundImage = `url('${coverUrl}')`;
            document.getElementById('pTitle').innerText = trackName;
            document.getElementById('pArtist').innerText = artist;

            // Check if we own this track locally
            if (ownedTracks.has(trackKey)) {
                getLocalAudio(trackKey, function(fileBlob) {
                    if(fileBlob) {
                        // Clean up old local blob to save memory
                        if(currentLocalBlobUrl) URL.revokeObjectURL(currentLocalBlobUrl);
                        
                        currentLocalBlobUrl = URL.createObjectURL(fileBlob);
                        audio.src = currentLocalBlobUrl;
                        audio.play();
                        document.getElementById('pPlayBtn').innerText = '⏸';
                    }
                });
            } else {
                // Play 30 sec preview fallback
                if (!previewUrl) { alert("No preview available, please upload a local file."); return; }
                if (currentPlayingUrl !== previewUrl) {
                    audio.src = previewUrl;
                    currentPlayingUrl = previewUrl;
                }
                audio.play();
                document.getElementById('pPlayBtn').innerText = '⏸';
            }
        }

        function togglePlayPause() {
            if (audio.paused) {
                audio.play();
                document.getElementById('pPlayBtn').innerText = '⏸';
            } else {
                audio.pause();
                document.getElementById('pPlayBtn').innerText = '▶';
            }
        }

        audio.onended = () => { document.getElementById('pPlayBtn').innerText = '▶'; };

        // --- UI LOGIC ---
        function openWatchView(hash) {
            const block = fullLedger.find(b => b.hash === hash);
            if(!block) return;

            document.getElementById('watchContainer').setAttribute('data-hash', hash);
            document.getElementById('gridContainer').style.display = 'none';
            document.getElementById('watchContainer').style.display = 'flex';
            
            const bgUrl = block.image_url || '';
            document.getElementById('wPlayer').style.backgroundImage = `url('${bgUrl}')`;
            document.getElementById('wPlayerArt').style.backgroundImage = `url('${bgUrl}')`;
            document.getElementById('wTitle').innerText = block.album;
            document.getElementById('wChannelName').innerText = block.artist;
            
            const tContainer = document.getElementById('wTracklist');
            tContainer.innerHTML = '';
            
            if (block.tracks && block.tracks.length > 0) {
                block.tracks.forEach((trackObj, index) => {
                    const tName = typeof trackObj === 'string' ? trackObj : trackObj.name;
                    const tAudio = typeof trackObj === 'string' ? null : trackObj.preview;
                    
                    // Generate unique key for this song based on Artist + Track Name
                    const trackKey = `${block.artist}||${tName}`;
                    const isOwned = ownedTracks.has(trackKey);
                    
                    const el = document.createElement('div');
                    el.className = 'track-item';
                    
                    const playHtml = `<button class="action-btn" title="Play Track" onclick="playAudio('${trackKey.replace(/'/g, "\\'")}', '${tAudio}', '${tName.replace(/'/g, "\\'")}', '${block.artist.replace(/'/g, "\\'")}', '${bgUrl}')">▶️</button>`;
                    
                    // If they uploaded it, show green checkmark. Otherwise, show upload folder icon.
                    const uploadHtml = isOwned 
                        ? `<span class="action-btn" title="Locally Saved" style="cursor:default;">✅</span><span class="local-badge">FULL MP3</span>`
                        : `<button class="action-btn" title="Upload Local MP3" onclick="triggerUpload('${trackKey.replace(/'/g, "\\'")}')">📁</button>`;

                    el.innerHTML = `
                        <span class="track-num">${index + 1}</span>
                        <span class="track-name">${tName}</span>
                        <div style="display:flex; gap:10px; align-items:center;">
                            ${playHtml}
                            ${uploadHtml}
                        </div>
                    `;
                    tContainer.appendChild(el);
                });
            }
        }

        function closeWatchView() {
            document.getElementById('watchContainer').style.display = 'none';
            document.getElementById('gridContainer').style.display = 'block';
            applyFilters();
        }

        function renderGrid(data) {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            data.forEach(block => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openWatchView(block.hash);
                card.innerHTML = `
                    <div class="thumbnail" style="background-image: url('${block.image_url}')"></div>
                    <div style="font-weight: 500; font-size: 14px; margin-top:5px;">${block.album}</div>
                    <div style="color: var(--text-secondary); font-size: 13px;">${block.artist}</div>
                `;
                grid.appendChild(card);
            });
        }

        function applyFilters() {
            let filtered = fullLedger;
            if (currentCategory !== 'All') {
                filtered = filtered.filter(b => b.artist === currentCategory);
            }
            renderGrid(filtered);
        }

        function setCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.sidebar-item, .filter-chip').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(category)) el.classList.add('active');
            });
            closeWatchView();
        }

        async function init() {
            try {
                const response = await fetch('ledger.json?nocache=' + new Date().getTime());
                if(response.ok) {
                    fullLedger = await response.json();
                    applyFilters();
                }
            } catch (err) { console.error(err); }
        }

        init();
    </script>
</body>
</html>
